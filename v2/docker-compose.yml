services:
  companion-v2-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${COMPANION_V2_POSTGRES_DB:-companion_v2}
      POSTGRES_USER: ${COMPANION_V2_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${COMPANION_V2_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${COMPANION_V2_POSTGRES_PORT:-19437}:5432"
    volumes:
      - companion-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  bff-v2-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BFF_V2_POSTGRES_DB:-bff_v2}
      POSTGRES_USER: ${BFF_V2_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${BFF_V2_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${BFF_V2_POSTGRES_PORT:-19438}:5432"
    volumes:
      - bff-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  nexus-v2-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEXUS_V2_POSTGRES_DB:-nexus_v2}
      POSTGRES_USER: ${NEXUS_V2_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${NEXUS_V2_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${NEXUS_V2_POSTGRES_PORT:-19439}:5432"
    volumes:
      - nexus-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-19686}:16686"

  companion-v2:
    build:
      context: .
      dockerfile: Dockerfile.companion
      target: dev
    command: ["air", "-c", "air.companion.toml"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      COMPANION_V2_ENV: ${COMPANION_V2_ENV:-development}
      COMPANION_V2_RUN_MIGRATIONS: ${COMPANION_V2_RUN_MIGRATIONS:-true}
      COMPANION_V2_CORS_ORIGINS: ${COMPANION_V2_CORS_ORIGINS:-http://localhost:19173,http://127.0.0.1:19173,http://console-v2:19173,http://console-v2-e2e:19173}
      COMPANION_V2_NEXUS_BASE_URL: ${COMPANION_V2_NEXUS_BASE_URL:-http://nexus-v2:8080}
      COMPANION_V2_EXECUTION_MODE: ${COMPANION_V2_EXECUTION_MODE:-local}
      COMPANION_V2_INTERNAL_AUTH_SECRET: ${AXIS_V2_INTERNAL_AUTH_SECRET:-axis-v2-local-internal}
      COMPANION_V2_DATABASE_URL: postgres://${COMPANION_V2_POSTGRES_USER:-postgres}:${COMPANION_V2_POSTGRES_PASSWORD:-postgres}@companion-v2-postgres:5432/${COMPANION_V2_POSTGRES_DB:-companion_v2}?sslmode=disable
      COMPANION_V2_OTEL_EXPORTER: ${COMPANION_V2_OTEL_EXPORTER:-otlp}
      COMPANION_V2_OTEL_OTLP_ENDPOINT: ${COMPANION_V2_OTEL_OTLP_ENDPOINT:-jaeger:4318}
      COMPANION_V2_OTEL_OTLP_INSECURE: ${COMPANION_V2_OTEL_OTLP_INSECURE:-true}
    volumes:
      - ./companion:/src/companion
      - ./air.companion.toml:/src/air.companion.toml:ro
      - ./companion/migrations:/src/migrations:ro
      - companion-v2-go-mod-cache:/go/pkg/mod
      - companion-v2-go-build-cache:/root/.cache/go-build
    ports:
      - "${COMPANION_V2_PORT:-19086}:8080"
    depends_on:
      companion-v2-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  nexus-v2:
    build:
      context: .
      dockerfile: Dockerfile.nexus
      target: dev
    command: ["air", "-c", "air.nexus.toml"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      NEXUS_V2_ENV: ${NEXUS_V2_ENV:-development}
      NEXUS_V2_RUN_MIGRATIONS: ${NEXUS_V2_RUN_MIGRATIONS:-true}
      NEXUS_V2_CORS_ORIGINS: ${NEXUS_V2_CORS_ORIGINS:-http://localhost:19173,http://127.0.0.1:19173,http://console-v2:19173,http://console-v2-e2e:19173}
      NEXUS_V2_INTERNAL_AUTH_SECRET: ${AXIS_V2_INTERNAL_AUTH_SECRET:-axis-v2-local-internal}
      NEXUS_V2_DATABASE_URL: postgres://${NEXUS_V2_POSTGRES_USER:-postgres}:${NEXUS_V2_POSTGRES_PASSWORD:-postgres}@nexus-v2-postgres:5432/${NEXUS_V2_POSTGRES_DB:-nexus_v2}?sslmode=disable
      NEXUS_V2_OTEL_EXPORTER: ${NEXUS_V2_OTEL_EXPORTER:-otlp}
      NEXUS_V2_OTEL_OTLP_ENDPOINT: ${NEXUS_V2_OTEL_OTLP_ENDPOINT:-jaeger:4318}
      NEXUS_V2_OTEL_OTLP_INSECURE: ${NEXUS_V2_OTEL_OTLP_INSECURE:-true}
    volumes:
      - ./nexus:/src/nexus
      - ./air.nexus.toml:/src/air.nexus.toml:ro
      - ./nexus/migrations:/src/migrations:ro
      - nexus-v2-go-mod-cache:/go/pkg/mod
      - nexus-v2-go-build-cache:/root/.cache/go-build
    ports:
      - "${NEXUS_V2_PORT:-19087}:8080"
    depends_on:
      nexus-v2-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  bff-v2:
    build:
      context: .
      dockerfile: Dockerfile.bff
      target: dev
    command: ["air", "-c", "air.bff.toml"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      BFF_V2_ENV: ${BFF_V2_ENV:-development}
      BFF_V2_RUN_MIGRATIONS: ${BFF_V2_RUN_MIGRATIONS:-true}
      BFF_V2_CORS_ORIGINS: ${BFF_V2_CORS_ORIGINS:-http://localhost:19173,http://127.0.0.1:19173,http://console-v2:19173,http://console-v2-e2e:19173}
      BFF_V2_COMPANION_BASE_URL: ${BFF_V2_COMPANION_BASE_URL:-http://companion-v2:8080}
      BFF_V2_NEXUS_BASE_URL: ${BFF_V2_NEXUS_BASE_URL:-http://nexus-v2:8080}
      BFF_V2_IDENTITY_PROVIDER: ${BFF_V2_IDENTITY_PROVIDER:-dev}
      BFF_V2_INTERNAL_AUTH_SECRET: ${AXIS_V2_INTERNAL_AUTH_SECRET:-axis-v2-local-internal}
      BFF_V2_CLERK_SECRET_KEY: ${BFF_V2_CLERK_SECRET_KEY:-${BFF_V2_CLERK_SECRET:-}}
      BFF_V2_CLERK_API_BASE_URL: ${BFF_V2_CLERK_API_BASE_URL:-https://api.clerk.com/v1}
      BFF_V2_CLERK_ISSUER_URL: ${BFF_V2_CLERK_ISSUER_URL:-}
      BFF_V2_CLERK_WEBHOOK_SECRET: ${BFF_V2_CLERK_WEBHOOK_SECRET:-}
      BFF_V2_CLERK_INVITE_REDIRECT_URL: ${BFF_V2_CLERK_INVITE_REDIRECT_URL:-}
      BFF_V2_DEV_ACTOR_ID: ${BFF_V2_DEV_ACTOR_ID:-dev-user}
      BFF_V2_DEV_ACTOR_EMAIL: ${BFF_V2_DEV_ACTOR_EMAIL:-dev@example.local}
      BFF_V2_DEV_ORG_ID: ${BFF_V2_DEV_ORG_ID:-dev-org}
      BFF_V2_DATABASE_URL: postgres://${BFF_V2_POSTGRES_USER:-postgres}:${BFF_V2_POSTGRES_PASSWORD:-postgres}@bff-v2-postgres:5432/${BFF_V2_POSTGRES_DB:-bff_v2}?sslmode=disable
      BFF_V2_OTEL_EXPORTER: ${BFF_V2_OTEL_EXPORTER:-otlp}
      BFF_V2_OTEL_OTLP_ENDPOINT: ${BFF_V2_OTEL_OTLP_ENDPOINT:-jaeger:4318}
      BFF_V2_OTEL_OTLP_INSECURE: ${BFF_V2_OTEL_OTLP_INSECURE:-true}
    volumes:
      - ./bff:/src/bff
      - ../../platform:/platform:ro
      - ./air.bff.toml:/src/air.bff.toml:ro
      - ./bff/migrations:/src/migrations:ro
      - bff-v2-go-mod-cache:/go/pkg/mod
      - bff-v2-go-build-cache:/root/.cache/go-build
    ports:
      - "${BFF_V2_PORT:-19080}:8080"
    depends_on:
      bff-v2-postgres:
        condition: service_healthy
      companion-v2:
        condition: service_healthy
      nexus-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  console-v2:
    build:
      context: .
      dockerfile: Dockerfile.console
    restart: unless-stopped
    environment:
      AXIS_BFF_BASE_URL: ${AXIS_CONSOLE_BFF_BASE_URL:-http://bff-v2:8080}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
      VITE_CLERK_JWT_TEMPLATE: ${VITE_CLERK_JWT_TEMPLATE:-axis-bff}
      VITE_HMR_CLIENT_PORT: ${AXIS_CONSOLE_PORT:-19173}
    volumes:
      - ./console:/app
      - console-v2-node-modules:/app/node_modules
    ports:
      - "${AXIS_CONSOLE_PORT:-19173}:19173"
    depends_on:
      bff-v2:
        condition: service_healthy

  console-v2-e2e:
    build:
      context: .
      dockerfile: Dockerfile.console
    environment:
      AXIS_BFF_BASE_URL: http://bff-v2:8080
      VITE_CLERK_PUBLISHABLE_KEY: ""
      VITE_CLERK_JWT_TEMPLATE: axis-bff
      VITE_HMR_CLIENT_PORT: "19173"
    volumes:
      - ./console:/app
      - console-v2-node-modules:/app/node_modules
    depends_on:
      bff-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:19173 >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  console-e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app
    environment:
      PLAYWRIGHT_BASE_URL: http://console-v2-e2e:19173
    volumes:
      - ./console:/app
      - console-v2-node-modules:/app/node_modules
    depends_on:
      console-v2-e2e:
        condition: service_healthy
    command: ["npm", "run", "test:e2e"]

  approval-flow-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /workspace
    environment:
      BFF_URL: http://bff-v2:8080
    volumes:
      - ./scripts:/workspace/scripts:ro
    depends_on:
      bff-v2:
        condition: service_healthy
    command: ["scripts/smoke-approval-flow.sh"]

  seed-demo:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /workspace
    environment:
      BFF_URL: http://bff-v2:8080
      CONSOLE_URL: ${AXIS_CONSOLE_URL:-http://localhost:19173}
    volumes:
      - ./scripts:/workspace/scripts:ro
    depends_on:
      bff-v2:
        condition: service_healthy
    command: ["scripts/seed-demo-flow.sh"]

volumes:
  companion-v2-postgres-data:
  bff-v2-postgres-data:
  nexus-v2-postgres-data:
  companion-v2-go-mod-cache:
  companion-v2-go-build-cache:
  bff-v2-go-mod-cache:
  bff-v2-go-build-cache:
  nexus-v2-go-mod-cache:
  nexus-v2-go-build-cache:
  console-v2-node-modules:
