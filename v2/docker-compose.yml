services:
  companion-v2-postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${COMPANION_V2_POSTGRES_DB:-companion_v2}
      POSTGRES_USER: ${COMPANION_V2_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${COMPANION_V2_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${COMPANION_V2_POSTGRES_PORT:-19437}:5432"
    volumes:
      - companion-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  bff-v2-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BFF_V2_POSTGRES_DB:-bff_v2}
      POSTGRES_USER: ${BFF_V2_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${BFF_V2_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${BFF_V2_POSTGRES_PORT:-19438}:5432"
    volumes:
      - bff-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  nexus-v2-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEXUS_V2_POSTGRES_DB:-nexus_v2}
      POSTGRES_USER: ${NEXUS_V2_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${NEXUS_V2_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${NEXUS_V2_POSTGRES_PORT:-19439}:5432"
    volumes:
      - nexus-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-19686}:16686"

  artifact-worker-v2:
    build:
      context: .
      dockerfile: Dockerfile.artifact-worker
    restart: unless-stopped
    environment:
      PORT: "8080"
      AXIS_V2_INTERNAL_AUTH_SECRET: ${AXIS_V2_INTERNAL_AUTH_SECRET:-axis-v2-local-internal}
      ARTIFACT_WORKER_CONCURRENCY: ${ARTIFACT_WORKER_CONCURRENCY:-2}
      ARTIFACT_WORKER_WHISPER_MODEL: ${ARTIFACT_WORKER_WHISPER_MODEL:-}
      ARTIFACT_WORKER_WHISPER_BIN: ${ARTIFACT_WORKER_WHISPER_BIN:-whisper-cli}
    read_only: true
    tmpfs:
      - /tmp:size=768m,mode=1777
    mem_limit: 1g
    pids_limit: 256
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  companion-v2:
    build:
      context: .
      dockerfile: Dockerfile.companion
      target: dev
    command: ["air", "-c", "air.companion.toml"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      COMPANION_V2_ENV: ${COMPANION_V2_ENV:-development}
      COMPANION_V2_RUN_MIGRATIONS: ${COMPANION_V2_RUN_MIGRATIONS:-true}
      COMPANION_V2_MAX_BODY_BYTES: ${COMPANION_V2_MAX_BODY_BYTES:-1048576}
      COMPANION_V2_KNOWLEDGE_UPLOAD_MAX_BODY_BYTES: ${COMPANION_V2_KNOWLEDGE_UPLOAD_MAX_BODY_BYTES:-263192576}
      COMPANION_V2_WATCHER_INTERVAL_SEC: ${COMPANION_V2_WATCHER_INTERVAL_SEC:-30}
      COMPANION_V2_STALE_ASSIST_SEC: ${COMPANION_V2_STALE_ASSIST_SEC:-300}
      COMPANION_V2_STALE_EXECUTION_SEC: ${COMPANION_V2_STALE_EXECUTION_SEC:-300}
      COMPANION_V2_WATCHER_LEASE_SEC: ${COMPANION_V2_WATCHER_LEASE_SEC:-30}
      COMPANION_V2_REPORT_BACKOFF_SEC: ${COMPANION_V2_REPORT_BACKOFF_SEC:-5}
      COMPANION_V2_WATCHER_BATCH_SIZE: ${COMPANION_V2_WATCHER_BATCH_SIZE:-50}
      COMPANION_V2_RECOVERY_MAX_ATTEMPTS: ${COMPANION_V2_RECOVERY_MAX_ATTEMPTS:-3}
      COMPANION_V2_CORS_ORIGINS: ${COMPANION_V2_CORS_ORIGINS:-http://localhost:19173,http://127.0.0.1:19173,http://console-v2:19173,http://console-v2-e2e:19173}
      COMPANION_V2_NEXUS_BASE_URL: ${COMPANION_V2_NEXUS_BASE_URL:-http://nexus-v2:8080}
      COMPANION_V2_RUNTIME_BASE_URL: ${COMPANION_V2_RUNTIME_BASE_URL:-http://runtime-v2:8080}
      COMPANION_V2_ARTIFACT_STAGING_BUCKET: ${COMPANION_V2_ARTIFACT_STAGING_BUCKET:-}
      COMPANION_V2_ARTIFACT_STAGING_PREFIX: ${COMPANION_V2_ARTIFACT_STAGING_PREFIX:-axis-v2/staging}
      COMPANION_V2_ARTIFACT_CMEK_KEY: ${COMPANION_V2_ARTIFACT_CMEK_KEY:-}
      COMPANION_V2_ARTIFACT_LOCAL_STAGING_DIR: ${COMPANION_V2_ARTIFACT_LOCAL_STAGING_DIR:-/var/lib/axis/artifacts}
      COMPANION_V2_ARTIFACT_LOCAL_MAX_BYTES: ${COMPANION_V2_ARTIFACT_LOCAL_MAX_BYTES:-5368709120}
      COMPANION_V2_MALWARE_SCANNER_ADDRESS: ${COMPANION_V2_MALWARE_SCANNER_ADDRESS:-}
      COMPANION_V2_ARTIFACT_FETCH_ALLOWED_HOSTS: ${COMPANION_V2_ARTIFACT_FETCH_ALLOWED_HOSTS:-}
      COMPANION_V2_ARTIFACT_EXTRACTOR_BASE_URL: ${COMPANION_V2_ARTIFACT_EXTRACTOR_BASE_URL:-http://artifact-worker-v2:8080}
      COMPANION_V2_EXECUTION_MODE: ${COMPANION_V2_EXECUTION_MODE:-local}
      # F6 real Google Calendar executor. Enable by setting EXECUTION_MODE to
      # include "google_calendar" plus a calendar id; credentials come from ADC
      # (GOOGLE_APPLICATION_CREDENTIALS -> a key mounted via the override, or a
      # workload service account in prod). See docs/f6-google-calendar-runbook.md.
      COMPANION_V2_GOOGLE_CALENDAR_ID: ${COMPANION_V2_GOOGLE_CALENDAR_ID:-}
      COMPANION_V2_GOOGLE_CALENDAR_SECRET_REF: ${COMPANION_V2_GOOGLE_CALENDAR_SECRET_REF:-}
      COMPANION_V2_EXECUTOR_ATTESTATION_SECRET_REF: ${COMPANION_V2_EXECUTOR_ATTESTATION_SECRET_REF:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      COMPANION_V2_INTERNAL_AUTH_SECRET: ${AXIS_V2_INTERNAL_AUTH_SECRET:-axis-v2-local-internal}
      COMPANION_V2_DATABASE_URL: postgres://${COMPANION_V2_POSTGRES_USER:-postgres}:${COMPANION_V2_POSTGRES_PASSWORD:-postgres}@companion-v2-postgres:5432/${COMPANION_V2_POSTGRES_DB:-companion_v2}?sslmode=disable
      COMPANION_V2_OTEL_EXPORTER: ${COMPANION_V2_OTEL_EXPORTER:-otlp}
      COMPANION_V2_OTEL_OTLP_ENDPOINT: ${COMPANION_V2_OTEL_OTLP_ENDPOINT:-jaeger:4318}
      COMPANION_V2_OTEL_OTLP_INSECURE: ${COMPANION_V2_OTEL_OTLP_INSECURE:-true}
    volumes:
      - ./companion:/src/companion
      - ./air.companion.toml:/src/air.companion.toml:ro
      - ./companion/migrations:/src/migrations:ro
      - companion-v2-go-mod-cache:/go/pkg/mod
      - companion-v2-go-build-cache:/root/.cache/go-build
      - companion-v2-artifact-staging:/var/lib/axis/artifacts
    ports:
      - "${COMPANION_V2_PORT:-19086}:8080"
    depends_on:
      companion-v2-postgres:
        condition: service_healthy
      artifact-worker-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 90s

  nexus-v2:
    build:
      context: .
      dockerfile: Dockerfile.nexus
      target: dev
    command: ["air", "-c", "air.nexus.toml"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      NEXUS_V2_ENV: ${NEXUS_V2_ENV:-development}
      NEXUS_V2_RUN_MIGRATIONS: ${NEXUS_V2_RUN_MIGRATIONS:-true}
      NEXUS_V2_APPROVAL_TTL_SEC: ${NEXUS_V2_APPROVAL_TTL_SEC:-3600}
      NEXUS_V2_WATCHER_INTERVAL_SEC: ${NEXUS_V2_WATCHER_INTERVAL_SEC:-30}
      NEXUS_V2_WATCHER_BATCH_SIZE: ${NEXUS_V2_WATCHER_BATCH_SIZE:-100}
      NEXUS_V2_CORS_ORIGINS: ${NEXUS_V2_CORS_ORIGINS:-http://localhost:19173,http://127.0.0.1:19173,http://console-v2:19173,http://console-v2-e2e:19173}
      NEXUS_V2_INTERNAL_AUTH_SECRET: ${AXIS_V2_INTERNAL_AUTH_SECRET:-axis-v2-local-internal}
      NEXUS_V2_EXECUTOR_ATTESTATION_SECRET_REF: ${NEXUS_V2_EXECUTOR_ATTESTATION_SECRET_REF:-}
      NEXUS_V2_DATABASE_URL: postgres://${NEXUS_V2_POSTGRES_USER:-postgres}:${NEXUS_V2_POSTGRES_PASSWORD:-postgres}@nexus-v2-postgres:5432/${NEXUS_V2_POSTGRES_DB:-nexus_v2}?sslmode=disable
      NEXUS_V2_OTEL_EXPORTER: ${NEXUS_V2_OTEL_EXPORTER:-otlp}
      NEXUS_V2_OTEL_OTLP_ENDPOINT: ${NEXUS_V2_OTEL_OTLP_ENDPOINT:-jaeger:4318}
      NEXUS_V2_OTEL_OTLP_INSECURE: ${NEXUS_V2_OTEL_OTLP_INSECURE:-true}
    volumes:
      - ./nexus:/src/nexus
      - ./air.nexus.toml:/src/air.nexus.toml:ro
      - ./nexus/migrations:/src/migrations:ro
      - nexus-v2-go-mod-cache:/go/pkg/mod
      - nexus-v2-go-build-cache:/root/.cache/go-build
    ports:
      - "${NEXUS_V2_PORT:-19087}:8080"
    depends_on:
      nexus-v2-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 90s

  runtime-v2:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      target: dev
    command: ["air", "-c", "air.runtime.toml"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      RUNTIME_V2_ENV: ${RUNTIME_V2_ENV:-development}
      RUNTIME_V2_CORS_ORIGINS: ${RUNTIME_V2_CORS_ORIGINS:-}
      RUNTIME_V2_INTERNAL_AUTH_SECRET: ${AXIS_V2_INTERNAL_AUTH_SECRET:-axis-v2-local-internal}
      RUNTIME_V2_LLM_PROVIDER: ${RUNTIME_V2_LLM_PROVIDER:-vertex}
      RUNTIME_V2_LLM_API_KEY: ${RUNTIME_V2_LLM_API_KEY:-}
      RUNTIME_V2_LLM_MODEL: ${RUNTIME_V2_LLM_MODEL:-gemini-2.5-flash-lite}
      RUNTIME_V2_VERTEX_PROJECT: ${RUNTIME_V2_VERTEX_PROJECT:-}
      RUNTIME_V2_VERTEX_LOCATION: ${RUNTIME_V2_VERTEX_LOCATION:-us-central1}
      RUNTIME_V2_EMBEDDING_MODEL: ${RUNTIME_V2_EMBEDDING_MODEL:-gemini-embedding-001}
      RUNTIME_V2_EMBEDDING_DIMENSIONS: ${RUNTIME_V2_EMBEDDING_DIMENSIONS:-768}
      RUNTIME_V2_DEVELOPMENT_EMBEDDINGS_ENABLED: ${RUNTIME_V2_DEVELOPMENT_EMBEDDINGS_ENABLED:-true}
      RUNTIME_V2_LLM_INPUT_COST_MICROUSD_PER_MILLION_TOKENS: ${RUNTIME_V2_LLM_INPUT_COST_MICROUSD_PER_MILLION_TOKENS:-0}
      RUNTIME_V2_LLM_OUTPUT_COST_MICROUSD_PER_MILLION_TOKENS: ${RUNTIME_V2_LLM_OUTPUT_COST_MICROUSD_PER_MILLION_TOKENS:-0}
      RUNTIME_V2_OTEL_EXPORTER: ${RUNTIME_V2_OTEL_EXPORTER:-otlp}
      RUNTIME_V2_OTEL_OTLP_ENDPOINT: ${RUNTIME_V2_OTEL_OTLP_ENDPOINT:-jaeger:4318}
      RUNTIME_V2_OTEL_OTLP_INSECURE: ${RUNTIME_V2_OTEL_OTLP_INSECURE:-true}
    volumes:
      - ./runtime:/src/runtime
      - ./air.runtime.toml:/src/air.runtime.toml:ro
      - runtime-v2-go-mod-cache:/go/pkg/mod
      - runtime-v2-go-build-cache:/root/.cache/go-build
    ports:
      - "${RUNTIME_V2_PORT:-19088}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 90s

  bff-v2:
    build:
      context: .
      dockerfile: Dockerfile.bff
      target: dev
    command: ["air", "-c", "air.bff.toml"]
    restart: unless-stopped
    environment:
      PORT: "8080"
      BFF_V2_ENV: ${BFF_V2_ENV:-development}
      BFF_V2_RUN_MIGRATIONS: ${BFF_V2_RUN_MIGRATIONS:-true}
      BFF_V2_MAX_BODY_BYTES: ${BFF_V2_MAX_BODY_BYTES:-1048576}
      BFF_V2_KNOWLEDGE_UPLOAD_MAX_BODY_BYTES: ${BFF_V2_KNOWLEDGE_UPLOAD_MAX_BODY_BYTES:-263192576}
      BFF_V2_CORS_ORIGINS: ${BFF_V2_CORS_ORIGINS:-http://localhost:19173,http://127.0.0.1:19173,http://console-v2:19173,http://console-v2-e2e:19173}
      BFF_V2_COMPANION_BASE_URL: ${BFF_V2_COMPANION_BASE_URL:-http://companion-v2:8080}
      BFF_V2_NEXUS_BASE_URL: ${BFF_V2_NEXUS_BASE_URL:-http://nexus-v2:8080}
      BFF_V2_IDENTITY_PROVIDER: ${BFF_V2_IDENTITY_PROVIDER:-dev}
      BFF_V2_INTERNAL_AUTH_SECRET: ${AXIS_V2_INTERNAL_AUTH_SECRET:-axis-v2-local-internal}
      # Product machine credentials for the inbound edge (POST /v1/assist-runs).
      # Format: <apiKey>=<organization>|<virployee>|<actor>|<product>, entries comma/newline-separated.
      BFF_V2_PRODUCT_API_KEYS: ${BFF_V2_PRODUCT_API_KEYS:-}
      BFF_V2_CLERK_SECRET_KEY: ${BFF_V2_CLERK_SECRET_KEY:-${BFF_V2_CLERK_SECRET:-}}
      BFF_V2_CLERK_API_BASE_URL: ${BFF_V2_CLERK_API_BASE_URL:-https://api.clerk.com/v1}
      BFF_V2_CLERK_ISSUER_URL: ${BFF_V2_CLERK_ISSUER_URL:-}
      BFF_V2_CLERK_WEBHOOK_SECRET: ${BFF_V2_CLERK_WEBHOOK_SECRET:-}
      BFF_V2_CLERK_INVITE_REDIRECT_URL: ${BFF_V2_CLERK_INVITE_REDIRECT_URL:-}
      BFF_V2_DEV_ACTOR_ID: ${BFF_V2_DEV_ACTOR_ID:-dev-user}
      BFF_V2_DEV_ACTOR_EMAIL: ${BFF_V2_DEV_ACTOR_EMAIL:-dev@example.local}
      BFF_V2_DEV_ORG_ID: ${BFF_V2_DEV_ORG_ID:-dev-org}
      BFF_V2_DATABASE_URL: postgres://${BFF_V2_POSTGRES_USER:-postgres}:${BFF_V2_POSTGRES_PASSWORD:-postgres}@bff-v2-postgres:5432/${BFF_V2_POSTGRES_DB:-bff_v2}?sslmode=disable
      BFF_V2_OTEL_EXPORTER: ${BFF_V2_OTEL_EXPORTER:-otlp}
      BFF_V2_OTEL_OTLP_ENDPOINT: ${BFF_V2_OTEL_OTLP_ENDPOINT:-jaeger:4318}
      BFF_V2_OTEL_OTLP_INSECURE: ${BFF_V2_OTEL_OTLP_INSECURE:-true}
    volumes:
      - ./bff:/src/bff
      - ../../platform:/platform:ro
      - ./air.bff.toml:/src/air.bff.toml:ro
      - ./bff/migrations:/src/migrations:ro
      - bff-v2-go-mod-cache:/go/pkg/mod
      - bff-v2-go-build-cache:/root/.cache/go-build
    ports:
      - "${BFF_V2_PORT:-19080}:8080"
    depends_on:
      bff-v2-postgres:
        condition: service_healthy
      companion-v2:
        condition: service_healthy
      nexus-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 90s

  console-v2:
    build:
      context: .
      dockerfile: Dockerfile.console
    restart: unless-stopped
    environment:
      AXIS_BFF_BASE_URL: ${AXIS_CONSOLE_BFF_BASE_URL:-http://bff-v2:8080}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
      VITE_CLERK_JWT_TEMPLATE: ${VITE_CLERK_JWT_TEMPLATE:-axis-bff}
      VITE_HMR_CLIENT_PORT: ${AXIS_CONSOLE_PORT:-19173}
    volumes:
      - ./console:/app
      - console-v2-node-modules:/app/node_modules
    ports:
      - "${AXIS_CONSOLE_PORT:-19173}:19173"
    depends_on:
      bff-v2:
        condition: service_healthy

  console-v2-e2e:
    build:
      context: .
      dockerfile: Dockerfile.console
    environment:
      AXIS_BFF_BASE_URL: http://bff-v2:8080
      VITE_CLERK_PUBLISHABLE_KEY: ""
      VITE_CLERK_JWT_TEMPLATE: axis-bff
      VITE_HMR_CLIENT_PORT: "19173"
    volumes:
      - ./console:/app
      - console-v2-node-modules:/app/node_modules
    depends_on:
      bff-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:19173 >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 30

  console-e2e:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_dir: /app
    environment:
      PLAYWRIGHT_BASE_URL: http://console-v2-e2e:19173
    volumes:
      - ./console:/app
      - console-v2-node-modules:/app/node_modules
    depends_on:
      console-v2-e2e:
        condition: service_healthy
    command: ["npm", "run", "test:e2e"]

  approval-flow-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /workspace
    environment:
      BFF_URL: http://bff-v2:8080
    volumes:
      - ./scripts:/workspace/scripts:ro
    depends_on:
      bff-v2:
        condition: service_healthy
    command: ["scripts/smoke-approval-flow.sh"]

  seed-demo:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /workspace
    environment:
      BFF_URL: http://bff-v2:8080
      CONSOLE_URL: ${AXIS_CONSOLE_URL:-http://localhost:19173}
    volumes:
      - ./scripts:/workspace/scripts:ro
    depends_on:
      bff-v2:
        condition: service_healthy
    command: ["scripts/seed-demo-flow.sh"]

volumes:
  companion-v2-postgres-data:
  bff-v2-postgres-data:
  nexus-v2-postgres-data:
  companion-v2-go-mod-cache:
  companion-v2-go-build-cache:
  companion-v2-artifact-staging:
  bff-v2-go-mod-cache:
  bff-v2-go-build-cache:
  nexus-v2-go-mod-cache:
  nexus-v2-go-build-cache:
  runtime-v2-go-mod-cache:
  runtime-v2-go-build-cache:
  console-v2-node-modules:
