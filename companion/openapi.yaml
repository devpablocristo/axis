openapi: 3.1.0
info:
  title: Companion API
  version: 0.1.0
  description: |
    API del empleado IA central del ecosistema.

    Companion acepta API key o Bearer JWT interno. Cuando hay principal
    autenticado, `org_id` se interpreta como customer org/work context: la
    empresa cliente donde trabaja el empleado IA. Headers como `X-Org-ID` y
    `X-User-ID` quedan como compatibilidad de dev/test, no como fuente canonica
    productiva.
servers:
  - url: http://localhost:18085
security:
  - apiKeyAuth: []
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        "200": { description: OK }
  /readyz:
    get:
      summary: Readiness check
      security: []
      responses:
        "200": { description: Ready }
  /v1/chat:
    post:
      summary: Conversa con Companion
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: Chat result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatResponse" }
  /v1/chat/conversations:
    get:
      summary: Lista conversaciones del agente (scoped por org+user)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationListResponse" }
  /v1/chat/conversations/{id}:
    get:
      summary: Detalle de una conversación con mensajes
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationDetail" }
        "404": { description: Conversation not found }
  /v1/notifications:
    post:
      summary: Genera insights/notificaciones de la customer org
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationsRequest" }
      responses:
        "200":
          description: Notifications result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationsResponse" }
  /v1/tasks:
    get:
      summary: Lista tasks de la customer org autenticada
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Task" }
    post:
      summary: Crea una task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTaskRequest" }
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
  /v1/tasks/{id}:
    get:
      summary: Obtiene detalle de task
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema: { type: object }
  /v1/tasks/{id}/message:
    post:
      summary: Agrega mensaje a task
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "201": { description: Message created }
  /v1/tasks/{id}/investigate:
    post:
      summary: Cambia task a investigación
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Task updated }
  /v1/tasks/{id}/propose:
    post:
      summary: Envía propuesta a Nexus
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Nexus submit result }
  /v1/tasks/{id}/plan:
    put:
      summary: Crea o reemplaza el plan durable cognitivo de una task
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetTaskPlanRequest" }
      responses:
        "200":
          description: Durable task plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskPlan" }
  /v1/tasks/{id}/plan/steps/{step_id}:
    patch:
      summary: Actualiza estado/evidencia de un paso del plan durable
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
        - in: path
          name: step_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTaskPlanStepRequest" }
      responses:
        "200":
          description: Durable task plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskPlan" }
  /v1/tasks/{id}/plan/checkpoint:
    post:
      summary: Registra checkpoint/next action del plan durable
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecordTaskPlanCheckpointRequest" }
      responses:
        "200":
          description: Durable task plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskPlan" }
  /v1/tasks/{id}/execution-plan:
    put:
      summary: Guarda plan de ejecución
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Execution plan }
  /v1/tasks/{id}/execute:
    post:
      summary: Ejecuta una task aprobada/controlada
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Execution result }
        "412": { description: Nexus not approved }
  /v1/tasks/{id}/retry:
    post:
      summary: Reintenta una ejecución retryable
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Execution result }
  /v1/tasks/{id}/sync:
    post:
      summary: Sincroniza estado de Nexus de una task
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Task updated }
  /v1/memory:
    get:
      summary: Busca memoria por scope
      parameters:
        - in: query
          name: scope_type
          required: true
          schema: { type: string, enum: [task, org, user] }
        - in: query
          name: scope_id
          required: true
          schema: { type: string }
        - in: query
          name: kind
          schema: { type: string }
      responses:
        "200": { description: Memory list }
    put:
      summary: Crea o actualiza memoria
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertMemoryRequest" }
      responses:
        "200": { description: Memory entry }
  /v1/memory/{id}:
    get:
      summary: Obtiene memoria por ID
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Memory entry }
    delete:
      summary: Borra memoria por ID
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "204": { description: Deleted }
  /v1/connectors:
    get:
      summary: Lista connectors
      responses:
        "200": { description: Connector list }
    post:
      summary: Crea connector config
      responses:
        "201": { description: Connector created }
  /v1/connectors/refresh:
    post:
      summary: Refresca connectors default
      responses:
        "200": { description: Refreshed }
  /v1/connectors/execute:
    post:
      summary: Ejecuta una capability
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Execution result }
        "403": { description: Forbidden or nexus denied }
  /v1/connectors/capabilities:
    get:
      summary: Lista capabilities disponibles
      responses:
        "200": { description: Capability list }
  /v1/connectors/capability-manifests:
    get:
      summary: Lista manifests versionados de capabilities
      parameters:
        - in: query
          name: include_writes
          schema: { type: boolean, default: false }
        - in: query
          name: max_risk_class
          schema: { type: string, enum: [low, medium, high, critical] }
      responses:
        "200":
          description: Capability manifest list
          content:
            application/json:
              schema:
                type: object
                required: [capabilities]
                properties:
                  capabilities:
                    type: array
                    items: { $ref: "#/components/schemas/CapabilityManifest" }
  /v1/connectors/{id}:
    get:
      summary: Obtiene connector
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Connector }
    delete:
      summary: Borra connector
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "204": { description: Deleted }
  /v1/connectors/{id}/executions:
    get:
      summary: Lista ejecuciones de connector
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Execution list }
  /v1/watchers:
    get:
      summary: Lista watchers por customer org
      parameters:
        - in: query
          name: org_id
          description: Customer org/work context. Direct cross-org requiere `companion:cross_org`.
          schema: { type: string }
      responses:
        "200": { description: Watcher list }
    post:
      summary: Crea watcher
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWatcherRequest" }
      responses:
        "201":
          description: Watcher created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Watcher" }
  /v1/watchers/{id}:
    get:
      summary: Obtiene watcher
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Watcher }
    patch:
      summary: Actualiza watcher
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWatcherRequest" }
      responses:
        "200":
          description: Watcher updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Watcher" }
    delete:
      summary: Borra watcher
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "204": { description: Deleted }
  /v1/watchers/{id}/run:
    post:
      summary: Ejecuta watcher manualmente
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Run result }
  /v1/watchers/{id}/proposals:
    get:
      summary: Lista proposals de watcher
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Proposal list }
  /v1/run-traces:
    get:
      summary: Lista run traces por org o task
      parameters:
        - in: query
          name: task_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: Trace list }
  /v1/run-traces/{run_id}:
    get:
      summary: Obtiene run trace
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Run trace }
  /v1/run-traces/{run_id}/replay:
    get:
      summary: Obtiene replay operativo de un run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Run replay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunReplay" }
  /v1/observability/events:
    get:
      summary: Lista eventos de observabilidad redacted
      parameters:
        - in: query
          name: run_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Observability events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/ObservabilityEvent" }
  /v1/runtime/policy:
    get:
      summary: Obtiene la política runtime de la customer org autenticada
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      responses:
        "200":
          description: Runtime policy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimePolicy" }
    put:
      summary: Actualiza la política runtime de la customer org autenticada
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimePolicyUpdate" }
      responses:
        "200":
          description: Runtime policy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimePolicy" }
  /v1/runtime/policy/audit:
    get:
      summary: Lista cambios versionados de la política runtime
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Runtime policy audit entries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimePolicyAuditResponse" }
  /v1/runtime/usage:
    get:
      summary: Consulta uso mensual de runtime de la customer org autenticada
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: period
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
          description: Periodo YYYY-MM. Default: mes actual.
      responses:
        "200":
          description: Runtime usage
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeUsage" }
  /v1/jobs/{id}:
    get:
      summary: Obtiene estado y evidence de un job durable
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200":
          description: Job durable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
  /v1/jobs/{id}/cancel:
    post:
      summary: Cancela un job durable queued/running
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { description: Cancelled }
  /v1/jobs/recover-expired:
    post:
      summary: Reencola jobs con leases vencidos
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1 }
      responses:
        "200": { description: Recovery summary }
  /v1/nexus-assist/propose:
    post:
      summary: Analiza historial Nexus y propone learning/policies
      responses:
        "200": { description: Proposal summary }
  /v1/nexus-assist/explain/{request_id}:
    get:
      summary: Explica una request de Nexus para humano
      parameters:
        - in: path
          name: request_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Explanation }
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UUIDPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string }
        task_id: { type: string, format: uuid }
        chat_id: { type: string, format: uuid, description: "Continúa conversación durable existente" }
        channel: { type: string, description: "Canal del caller. Default: api." }
        product_surface: { type: string }
        route_hint: { type: string }
        confirmed_actions:
          type: array
          items: { type: string }
        handoff: { $ref: "#/components/schemas/ChatHandoff" }
    ChatResponse:
      description: |
        Response canónico del chat de Companion. Incluye chat_id, reply y
        blocks del contrato compartido, más task y messages como estado
        operativo estable de la API.
      type: object
      required: [reply, task, messages]
      properties:
        chat_id: { type: string, format: uuid }
        reply: { type: string }
        blocks:
          type: array
          items: { $ref: "#/components/schemas/ChatBlock" }
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/ChatToolCall" }
        pending_confirmations:
          type: array
          items: { $ref: "#/components/schemas/ChatPendingConfirmation" }
        tokens_used: { type: integer }
        routed_agent: { type: string }
        routing_source: { type: string }
        output_kind: { type: string }
        task: { $ref: "#/components/schemas/Task" }
        messages:
          type: array
          items: { $ref: "#/components/schemas/TaskMessage" }
    ChatHandoff:
      type: object
      required: [source]
      properties:
        source: { type: string }
        target_agent: { type: string }
    ChatBlock:
      description: |
        Unión etiquetada por `type`. v0.1 solo expone la variante "text".
        Variantes reservadas (no emitirlas todavía): "actions",
        "insight_card", "kpi_group", "table".
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [text, actions, insight_card, kpi_group, table] }
        text: { type: string, description: "presente cuando type=text" }
    ChatToolCall:
      type: object
      required: [name]
      properties:
        name: { type: string }
        args: {}
        result: {}
        duration_ms: { type: integer }
        error: { type: string }
    ChatPendingConfirmation:
      type: object
      required: [id]
      properties:
        id: { type: string }
        description: { type: string }
        binding_hash: { type: string }
    TaskMessage:
      type: object
      properties:
        id: { type: string, format: uuid }
        author_type: { type: string, enum: [user, assistant, system, tool] }
        author_id: { type: string }
        body: { type: string }
        metadata: { type: object, additionalProperties: true }
        created_at: { type: string, format: date-time }
    CapabilityManifest:
      type: object
      required:
        - schema_version
        - capability_id
        - version
        - display_name
        - description
        - owner
        - product_surface
        - connector
        - action_type
        - risk_level
        - side_effect_type
        - auth_mode
        - input_schema
        - output_schema
        - evidence_schema
        - idempotency_mode
        - approval_required
        - tenant_configurable
        - enabled_by_default
        - rate_limit_class
        - cost_class
        - timeout
        - retries
      properties:
        schema_version: { type: string, enum: [capability_manifest.v1] }
        capability_id: { type: string }
        version: { type: string }
        display_name: { type: string }
        description: { type: string }
        owner: { type: string }
        product_surface: { type: string }
        connector: { type: string }
        action_type: { type: string, enum: [read, write] }
        risk_level: { type: string, enum: [low, medium, high, critical] }
        side_effect_type: { type: string, enum: [read, write, notify, execute] }
        auth_mode: { type: string }
        required_scopes:
          type: array
          items: { type: string }
        input_schema: { type: object, additionalProperties: true }
        output_schema: { type: object, additionalProperties: true }
        evidence_schema: { type: object, additionalProperties: true }
        required_evidence:
          type: array
          items: { type: string }
        idempotency_mode: { type: string, enum: [none, optional, required] }
        rollback_supported: { type: boolean }
        rollback_capability_id: { type: string }
        compensation_strategy: { type: string }
        nexus_action_type: { type: string }
        approval_required: { type: boolean }
        tenant_configurable: { type: boolean }
        enabled_by_default: { type: boolean }
        rate_limit_class: { type: string }
        cost_class: { type: string }
        timeout: { type: string }
        retries:
          type: object
          properties:
            max_attempts: { type: integer, minimum: 1 }
            backoff: { type: string }
        postconditions:
          type: array
          items: { type: string }
        preconditions:
          type: array
          items: { type: string }
        observability_tags:
          type: array
          items: { type: string }
    ConversationSummary:
      type: object
      required: [id, created_at, updated_at, message_count]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        message_count: { type: integer }
        product_surface: { type: string }
    ConversationMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [user, assistant, system, tool] }
        content: { type: string }
        timestamp: { type: string, format: date-time }
        blocks:
          type: array
          items: { $ref: "#/components/schemas/ChatBlock" }
    ConversationDetail:
      type: object
      required: [id, created_at, updated_at, messages]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        messages:
          type: array
          items: { $ref: "#/components/schemas/ConversationMessage" }
    ConversationListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ConversationSummary" }
        next_cursor: { type: string }
    NotificationsRequest:
      type: object
      properties:
        kind: { type: string, default: insight }
        period: { type: string, enum: [today, week, month] }
        compare: { type: boolean }
        top_limit: { type: integer }
        preferred_language: { type: string }
    NotificationsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/NotificationItem" }
        service_kind: { type: string }
        output_kind: { type: string }
    NotificationItem:
      type: object
      required: [id, title]
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        severity: { type: string }
        period: { type: string }
        scope: { type: string }
        context: {}
    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        goal: { type: string }
        priority: { type: string }
        created_by:
          type: string
          description: Si falta, Companion usa el actor efectivo autenticado; si difiere, debe coincidir con `on_behalf_of` o requerir scope operador.
        assigned_to: { type: string }
        channel: { type: string }
        summary: { type: string }
        context_json: { type: object, additionalProperties: true }
    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
