openapi: 3.1.0
info:
  title: Companion API
  version: 0.1.0
  description: |
    API del empleado IA central del ecosistema.

    Companion acepta API key o Bearer JWT interno. Cuando hay principal
    autenticado, `org_id` se interpreta como customer org/work context: la
    empresa cliente donde trabaja el empleado IA. Headers como `X-Org-ID` y
    `X-User-ID` quedan como compatibilidad de dev/test, no como fuente canonica
    productiva.
servers:
  - url: http://localhost:18085
security:
  - apiKeyAuth: []
  - bearerAuth: []
paths:
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        "200": { description: OK }
  /readyz:
    get:
      summary: Readiness check
      security: []
      responses:
        "200": { description: Ready }
  /mcp:
    post:
      summary: Axis MCP JSON-RPC endpoint
      description: |
        Endpoint MCP operativo para agentes externos autorizados. Soporta
        `initialize`, `ping`, `tools/list` y `tools/call`. Toda llamada requiere
        identidad autenticada con `companion:mcp:execute`; `tools/call` pasa por
        Nexus antes de ejecutar cualquier herramienta.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MCPJSONRPCRequest" }
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPJSONRPCResponse" }
  /v1/mcp/tools:
    get:
      summary: Lista tools MCP gobernadas
      description: Requiere `companion:mcp:execute`.
      responses:
        "200":
          description: Tool registry
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPToolsResponse" }
        "403": { description: Missing MCP execute scope }
  /v1/mcp/tools/call:
    post:
      summary: Ejecuta una tool MCP gobernada
      description: |
        Invocación REST equivalente a `tools/call`. La llamada se rate-limitea
        por `org_id + product_surface`, se audita en observabilidad, redacciona
        payloads sensibles y siempre pasa por Nexus antes de ejecutar.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MCPToolCallRequest" }
      responses:
        "200":
          description: Tool executed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPToolCallResponse" }
        "202":
          description: Nexus approval pending
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPToolCallResponse" }
        "400": { description: Invalid MCP tool call }
        "403": { description: "Denied by auth, scope, or Nexus" }
        "413": { description: "MCP request, arguments, or result exceeds size limits" }
        "429": { description: Rate limited by org and product surface }
        "500": { description: MCP execution failed }
  /v1/chat:
    post:
      summary: Conversa con Companion
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: Chat result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatResponse" }
  /v1/chat/conversations:
    get:
      summary: Lista conversaciones del agente (scoped por org+user)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationListResponse" }
  /v1/chat/conversations/{id}:
    get:
      summary: Detalle de una conversación con mensajes
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Conversation detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationDetail" }
        "404": { description: Conversation not found }
  /v1/notifications:
    post:
      summary: Genera insights/notificaciones de la customer org
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationsRequest" }
      responses:
        "200":
          description: Notifications result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationsResponse" }
  /v1/customer-messaging/inbound:
    post:
      summary: Procesa un mensaje inbound server-to-server desde un producto autorizado
      description: |
        Contrato público server-to-server para integraciones de customer messaging.
        Pymes usa este endpoint para inbound WhatsApp. Requiere Bearer JWT interno
        o credencial de servicio equivalente con `companion:tasks:write`, `org_id`
        de customer org y `product_surface=pymes`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CustomerMessagingInboundRequest" }
      responses:
        "200":
          description: Message processed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomerMessagingInboundResponse" }
        "400": { description: Invalid payload }
        "401": { description: Missing or invalid service identity }
        "403": { description: "Missing scope, wrong org, or disallowed product surface" }
        "409": { description: Duplicate message or conflicting state }
        "429": { description: Rate limited }
        "500": { description: Processing failed }
  /v1/tasks:
    get:
      summary: Lista tasks de la customer org autenticada
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Task" }
    post:
      summary: Crea una task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTaskRequest" }
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
  /v1/tasks/{id}:
    get:
      summary: Obtiene detalle de task
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema: { type: object }
  /v1/tasks/{id}/message:
    post:
      summary: Agrega mensaje a task
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "201": { description: Message created }
  /v1/tasks/{id}/investigate:
    post:
      summary: Cambia task a investigación
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Task updated }
  /v1/tasks/{id}/propose:
    post:
      summary: Envía propuesta a Nexus
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Nexus submit result }
  /v1/tasks/{id}/plan:
    put:
      summary: Crea o reemplaza el plan durable cognitivo de una task
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetTaskPlanRequest" }
      responses:
        "200":
          description: Durable task plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskPlan" }
  /v1/tasks/{id}/graph:
    get:
      summary: Lista eventos del execution graph durable de una task
      description: Permite replay operacional por task/step sin depender del contexto conversacional.
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
      responses:
        "200":
          description: Execution graph events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { type: object, additionalProperties: true }
  /v1/tasks/{id}/plan/steps/{step_id}:
    patch:
      summary: Actualiza estado/evidencia de un paso del plan durable
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
        - in: path
          name: step_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTaskPlanStepRequest" }
      responses:
        "200":
          description: Durable task plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskPlan" }
  /v1/tasks/{id}/plan/checkpoint:
    post:
      summary: Registra checkpoint/next action del plan durable
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RecordTaskPlanCheckpointRequest" }
      responses:
        "200":
          description: Durable task plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskPlan" }
  /v1/tasks/{id}/execution-plan:
    put:
      summary: Guarda plan de ejecución
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Execution plan }
  /v1/tasks/{id}/execute:
    post:
      summary: Ejecuta una task aprobada/controlada
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Execution result }
        "412": { description: Nexus not approved }
  /v1/tasks/{id}/retry:
    post:
      summary: Reintenta una ejecución retryable
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Execution result }
  /v1/tasks/{id}/sync:
    post:
      summary: Sincroniza estado de Nexus de una task
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Task updated }
  /v1/memory:
    get:
      summary: Busca memoria por scope
      parameters:
        - in: query
          name: scope_type
          required: true
          schema: { type: string, enum: [task, org, user] }
        - in: query
          name: scope_id
          required: true
          schema: { type: string }
        - in: query
          name: kind
          schema: { type: string }
      responses:
        "200": { description: Memory list }
    put:
      summary: Crea o actualiza memoria
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertMemoryRequest" }
      responses:
        "200": { description: Memory entry }
  /v1/memory/search:
    get:
      summary: Busca memoria con ranking v2
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: scope_type
          required: true
          schema: { type: string, enum: [task, org, user] }
        - in: query
          name: scope_id
          required: true
          schema: { type: string }
        - in: query
          name: kind
          schema: { type: string }
        - in: query
          name: memory_type
          schema: { type: string }
      responses:
        "200":
          description: Ranked memory results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemorySearchResponse" }
  /v1/memory/conflicts:
    get:
      summary: Lista conflictos de memoria pendientes de revisión
      description: Requiere `companion:memory:admin`.
      responses:
        "200": { description: Memory conflicts }
  /v1/memory/reviews:
    get:
      summary: Lista reviews de memoria
      description: Requiere `companion:memory:admin`.
      responses:
        "200": { description: Memory reviews }
  /v1/memory/reviews/{review_id}/approve:
    post:
      summary: Aprueba una review de memoria
      description: Requiere `companion:memory:admin`.
      parameters:
        - in: path
          name: review_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Memory review approved }
  /v1/memory/reviews/{review_id}/reject:
    post:
      summary: Rechaza una review de memoria
      description: Requiere `companion:memory:admin`.
      parameters:
        - in: path
          name: review_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Memory review rejected }
  /v1/memory/reviews/{review_id}/apply:
    post:
      summary: Aplica una review aprobada u abierta de memoria
      description: Ejecuta corrección, invalidación, resolución de conflicto o deletion con auditoría.
      parameters:
        - in: path
          name: review_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Memory review applied }
  /v1/memory/audit:
    get:
      summary: Lista auditoría de memoria
      description: Requiere `companion:memory:admin`.
      responses:
        "200": { description: Memory audit }
  /v1/memory/summaries:
    get:
      summary: Lista summaries versionados de memoria
      description: Requiere `companion:memory:admin`.
      responses:
        "200": { description: Memory summaries }
  /v1/memory/export:
    get:
      summary: Exporta memoria de la customer org autenticada
      description: Requiere `companion:memory:admin`.
      responses:
        "200": { description: Memory export }
  /v1/memory/org:
    delete:
      summary: Borra toda la memoria de la customer org autenticada
      description: Requiere `companion:memory:admin` y `confirm=true`.
      parameters:
        - in: query
          name: confirm
          required: true
          schema: { type: string, enum: ["true"] }
      responses:
        "200": { description: Deleted count }
  /v1/memories:
    get:
      summary: Lista contenedores Memory
      description: Memory es el contenedor fuerte que puede referenciar un Virtual Employee mediante `memory_id`.
      parameters:
        - in: query
          name: lifecycle
          schema: { type: string, enum: [active, archived, all], default: active }
      responses:
        "200":
          description: Memory container list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Memory" }
    post:
      summary: Crea un contenedor Memory
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MemoryInput" }
      responses:
        "201":
          description: Memory container created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Memory" }
  /v1/memories/{memory_id}:
    get:
      summary: Obtiene un contenedor Memory
      parameters:
        - in: path
          name: memory_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Memory container
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Memory" }
    patch:
      summary: Actualiza un contenedor Memory
      parameters:
        - in: path
          name: memory_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MemoryInput" }
      responses:
        "200":
          description: Memory container updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Memory" }
  /v1/memories/{memory_id}/status:
    post:
      summary: Cambia status de un contenedor Memory
      parameters:
        - in: path
          name: memory_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, disabled, archived] }
      responses:
        "200":
          description: Memory status changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Memory" }
  /v1/memories/{memory_id}/entries:
    get:
      summary: Lista entries de un contenedor Memory
      parameters:
        - in: path
          name: memory_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Memory entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/MemoryContainerEntry" }
    post:
      summary: Crea un entry dentro de un contenedor Memory
      parameters:
        - in: path
          name: memory_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MemoryContainerEntryInput" }
      responses:
        "201":
          description: Memory entry created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemoryContainerEntry" }
  /v1/memory/{id}/reviews:
    post:
      summary: Crea una review de memoria
      description: Requiere `companion:memory:admin`.
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "201": { description: Memory review created }
  /v1/memory/{id}:
    get:
      summary: Obtiene memoria por ID
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Memory entry }
    delete:
      summary: Borra memoria por ID
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "204": { description: Deleted }
  /v1/connectors:
    get:
      summary: Lista connectors
      responses:
        "200": { description: Connector list }
    post:
      summary: Crea connector config
      responses:
        "201": { description: Connector created }
  /v1/connectors/refresh:
    post:
      summary: Refresca connectors default
      responses:
        "200": { description: Refreshed }
  /v1/connectors/execute:
    post:
      summary: Ejecuta una capability
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: Execution result }
        "403": { description: Forbidden or nexus denied }
  /v1/connectors/action-binding:
    post:
      summary: Calcula el action binding Nexus para una capability
      description: Requiere `companion:connectors:execute`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          description: Action binding for Nexus
          content:
            application/json:
              schema:
                type: object
                required: [action_binding, binding_hash]
                properties:
                  action_binding:
                    type: object
                    additionalProperties: true
                  binding_hash:
                    type: string
        "403": { description: Forbidden }
  /v1/connectors/capabilities:
    get:
      summary: Lista capabilities disponibles
      responses:
        "200": { description: Capability list }
  /v1/connectors/capability-manifests:
    get:
      summary: Lista manifests versionados de capabilities
      parameters:
        - in: query
          name: include_writes
          schema: { type: boolean, default: false }
        - in: query
          name: max_risk_class
          schema: { type: string, enum: [low, medium, high, critical] }
      responses:
        "200":
          description: Capability manifest list
          content:
            application/json:
              schema:
                type: object
                required: [capabilities]
                properties:
                  capabilities:
                    type: array
                    items: { $ref: "#/components/schemas/CapabilityManifest" }
  /v1/capabilities:
    get:
      summary: Lista capabilities
      description: |
        Superficie publica de Capability. `capability_id` es UUID publico; la
        key semantica historica vive en `capability_key`. Por compatibilidad
        tambien devuelve `manifest_records` con los manifests versionados.
      responses:
        "200":
          description: Capability list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Capability" }
                  capability_catalog:
                    type: array
                    items: { $ref: "#/components/schemas/Capability" }
                  manifest_records:
                    type: array
                    items: { $ref: "#/components/schemas/CapabilityManifestRecord" }
                  capabilities:
                    type: array
                    deprecated: true
                    items: { $ref: "#/components/schemas/CapabilityManifestRecord" }
    post:
      summary: Importa un capability manifest como draft
      description: Requiere `companion:capabilities:admin`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CapabilityManifest" }
      responses:
        "201": { description: Capability imported }
  /v1/capabilities/{capability_id}:
    get:
      summary: Obtiene una Capability por UUID
      parameters:
        - in: path
          name: capability_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Capability
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capability" }
        "404": { description: Capability not found }
  /v1/capabilities/{capability_id}/status:
    post:
      summary: Cambia el status de una Capability
      parameters:
        - in: path
          name: capability_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [draft, active, deprecated, blocked] }
      responses:
        "200":
          description: Capability status changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capability" }
  /v1/tools:
    get:
      summary: Lista Tools tecnicas derivadas de capabilities
      description: Tools son funciones tecnicas invocables; no reemplazan Capability ni son asignadas directamente al Employee en el modelo objetivo.
      responses:
        "200":
          description: Tool list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items: { $ref: "#/components/schemas/Tool" }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Tool" }
  /v1/tools/{tool_id}:
    get:
      summary: Obtiene una Tool por UUID
      parameters:
        - in: path
          name: tool_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Tool
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tool" }
        "404": { description: Tool not found }
  /v1/tools/{tool_id}/status:
    post:
      summary: Cambia el status de una Tool derivada
      description: En v1 actualiza el status del manifest subyacente; `disabled` mapea a `blocked`.
      parameters:
        - in: path
          name: tool_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, disabled, deprecated] }
      responses:
        "200":
          description: Tool status changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Tool" }
  /v1/capabilities/import-source:
    post:
      summary: Importa capability manifests desde una fuente JSON
      description: |
        Requiere `companion:capabilities:admin`. La fuente debe publicar un
        `CapabilityManifest` o `{ capabilities: [...] }`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CapabilityManifestSourceImportRequest" }
      responses:
        "201": { description: Capability manifests imported as draft }
  /v1/capabilities/validate:
    post:
      summary: Valida contrato y conformance de un manifest
      description: Requiere `companion:capabilities:admin`.
      responses:
        "200": { description: Validation result }
  /v1/capabilities/conformance-runs:
    get:
      summary: Lista conformance runs
      responses:
        "200": { description: Conformance runs }
    post:
      summary: Ejecuta conformance para una capability
      description: Requiere `companion:capabilities:admin`.
      responses:
        "201": { description: Conformance run }
  /v1/capabilities/{capability_id}/versions:
    get:
      summary: Lista versiones de una capability
      parameters:
        - in: path
          name: capability_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Capability versions }
  /v1/capabilities/{capability_id}/versions/{version}/promote:
    post:
      summary: Promueve un manifest a active si pasa conformance
      parameters:
        - in: path
          name: capability_id
          required: true
          schema: { type: string }
        - in: path
          name: version
          required: true
          schema: { type: string }
      responses:
        "200": { description: Capability manifest promoted }
        "400": { description: Conformance failed }
  /v1/capabilities/{capability_id}/versions/{version}/deprecate:
    post:
      summary: Marca un manifest como deprecated
      parameters:
        - in: path
          name: capability_id
          required: true
          schema: { type: string }
        - in: path
          name: version
          required: true
          schema: { type: string }
      responses:
        "200": { description: Capability manifest deprecated }
  /v1/capabilities/{capability_id}/versions/{version}/block:
    post:
      summary: Bloquea manualmente un manifest
      parameters:
        - in: path
          name: capability_id
          required: true
          schema: { type: string }
        - in: path
          name: version
          required: true
          schema: { type: string }
      responses:
        "200": { description: Capability manifest blocked }
  /v1/connectors/{id}:
    get:
      summary: Obtiene connector
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Connector }
    delete:
      summary: Borra connector
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "204": { description: Deleted }
  /v1/connectors/{id}/executions:
    get:
      summary: Lista ejecuciones de connector
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Execution list }
  /v1/watchers:
    get:
      summary: Lista watchers por customer org
      parameters:
        - in: query
          name: org_id
          description: Customer org/work context. Direct cross-org requiere `companion:cross_org`.
          schema: { type: string }
      responses:
        "200": { description: Watcher list }
    post:
      summary: Crea watcher
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWatcherRequest" }
      responses:
        "201":
          description: Watcher created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Watcher" }
  /v1/watchers/{id}:
    get:
      summary: Obtiene watcher
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Watcher }
    patch:
      summary: Actualiza watcher
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWatcherRequest" }
      responses:
        "200":
          description: Watcher updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Watcher" }
    delete:
      summary: Borra watcher
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "204": { description: Deleted }
  /v1/watchers/{id}/run:
    post:
      summary: Ejecuta watcher manualmente
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Run result }
  /v1/watchers/{id}/proposals:
    get:
      summary: Lista proposals de watcher
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200": { description: Proposal list }
  /v1/run-traces:
    get:
      summary: Lista run traces por org o task
      parameters:
        - in: query
          name: task_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        "200": { description: Trace list }
  /v1/run-traces/{run_id}:
    get:
      summary: Obtiene run trace
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Run trace }
  /v1/run-traces/{run_id}/replay:
    get:
      summary: Obtiene replay operativo de un run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Run replay
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunReplay" }
  /v1/observability/events:
    get:
      summary: Lista eventos de observabilidad redacted
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: run_id
          schema: { type: string, format: uuid }
        - in: query
          name: event_type
          schema: { type: string }
        - in: query
          name: event_name
          schema: { type: string }
        - in: query
          name: severity
          schema: { type: string }
        - in: query
          name: capability_id
          schema: { type: string }
        - in: query
          name: tool_name
          description: Alias operativo de capability_id para herramientas MCP.
          schema: { type: string }
        - in: query
          name: agent_id
          schema: { type: string }
        - in: query
          name: task_id
          schema: { type: string, format: uuid }
        - in: query
          name: job_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Observability events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/ObservabilityEvent" }
  /v1/runtime/policy:
    get:
      summary: Obtiene la política runtime de la customer org autenticada
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      responses:
        "200":
          description: Runtime policy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimePolicy" }
    put:
      summary: Actualiza la política runtime de la customer org autenticada
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RuntimePolicyUpdate" }
      responses:
        "200":
          description: Runtime policy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimePolicy" }
  /v1/runtime/policy/audit:
    get:
      summary: Lista cambios versionados de la política runtime
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: Runtime policy audit entries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimePolicyAuditResponse" }
  /v1/runtime/mcp-policy:
    get:
      summary: Obtiene la vista MCP de la política runtime
      description: Requiere `companion:runtime:admin` o `companion:cross_org`. `enabled`, `kill_switch`, `allowed_product_surfaces` y `product_policies.denied` son controles runtime-level.
      responses:
        "200":
          description: MCP runtime policy view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPRuntimePolicy" }
    put:
      summary: Actualiza solo los controles MCP de la política runtime
      description: Requiere `companion:runtime:admin` o `companion:cross_org`. Preserva modelos, budgets, autonomy, memory, connectors y otros campos no-MCP.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MCPRuntimePolicyUpdate" }
      responses:
        "200":
          description: MCP runtime policy view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPRuntimePolicy" }
  /v1/runtime/usage:
    get:
      summary: Consulta uso mensual de runtime de la customer org autenticada
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: period
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
          description: "Periodo YYYY-MM. Default: mes actual."
      responses:
        "200":
          description: Runtime usage
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RuntimeUsage" }
  /v1/runtime/costs:
    get:
      summary: Consulta costos atribuidos a la customer org autenticada
      description: Requiere contexto de org y devuelve eventos redacted.
      parameters:
        - in: query
          name: period
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        "200": { description: Cost summary }
  /v1/ops/console:
    get:
      summary: Vista operativa agregada por org/producto
      description: Requiere `companion:ops:read`, `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
          description: Solo disponible para principales con `companion:cross_org`; si falta se usa la org del principal.
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: period
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        "200": { description: Ops console snapshot }
  /v1/ops/alerts:
    get:
      summary: Lista alertas operativas derivadas
      description: Requiere `companion:ops:read`, `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: period
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        "200": { description: Ops alerts }
  /v1/ops/alerts/dispatch:
    post:
      summary: Despacha alertas operativas al webhook configurado
      description: Requiere `companion:runtime:admin` o `companion:cross_org`. Usa `COMPANION_OPS_ALERT_WEBHOOK_URL`.
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: period
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        "202": { description: Alert dispatch accepted }
        "503": { description: Alert webhook not configured }
  /v1/ops/metrics:
    get:
      summary: Lista metricas operativas derivadas por producto
      description: Requiere `companion:ops:read`, `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: period
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        "200": { description: Ops metrics }
  /v1/ops/slos:
    get:
      summary: Lista SLOs operativos por producto
      description: Requiere `companion:ops:read`, `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: period
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}$"
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      responses:
        "200": { description: Product SLOs }
  /v1/security-evals/suites:
    get:
      summary: Lista suites adversariales disponibles
      description: Requiere `companion:evals:admin`, `companion:runtime:admin` o `companion:cross_org`.
      responses:
        "200": { description: Security eval suites }
  /v1/security-evals/runs:
    post:
      summary: Ejecuta una suite adversarial y persiste el reporte
      description: Falla con 422 cuando el score queda por debajo del threshold.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                suite: { type: string, default: security-adversarial }
      responses:
        "201": { description: Security eval report passed }
        "422": { description: Security eval report failed }
  /v1/security-evals/reports:
    get:
      summary: Lista reportes persistidos de security evals
      parameters:
        - in: query
          name: suite
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200": { description: Security eval reports }
  /v1/jobs:
    get:
      summary: Lista jobs durables de la customer org autenticada
      description: Requiere `companion:runtime:admin` o `companion:cross_org`. Sin `companion:cross_org`, el listado queda limitado al `product_surface` del principal.
      parameters:
        - in: query
          name: product_surface
          schema: { type: string }
          description: Filtra jobs por producto. Requerido implicitamente para principales sin `companion:cross_org`.
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, running, succeeded, failed, dead_letter, cancelled]
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200": { description: Job list }
  /v1/business-model:
    get:
      summary: Obtiene el modelo empresarial activo
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      responses:
        "200":
          description: Business model
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessModel" }
    put:
      summary: Guarda una nueva versión del modelo empresarial
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BusinessModel" }
      responses:
        "200":
          description: Business model
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BusinessModel" }
  /v1/products:
    get:
      summary: Lista productos registrados en Axis
      description: Requiere `companion:products:read`, `companion:products:admin`, `companion:runtime:admin` o `companion:cross_org`.
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items: { $ref: "#/components/schemas/Product" }
  /v1/products/{product_surface}:
    get:
      summary: Obtiene un producto registrado
      parameters:
        - in: path
          name: product_surface
          required: true
          schema: { type: string }
      responses:
        "200": { description: Product }
        "404": { description: Product not found }
    put:
      summary: Crea o actualiza un producto registrado
      parameters:
        - in: path
          name: product_surface
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductInput" }
      responses:
        "200": { description: Product saved }
  /v1/product-installations:
    get:
      summary: Lista installations por customer org
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
      responses:
        "200":
          description: Installation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  installations:
                    type: array
                    items: { $ref: "#/components/schemas/ProductInstallation" }
  /v1/product-installations/{product_surface}:
    get:
      summary: Obtiene una installation por `org_id + product_surface`
      parameters:
        - in: path
          name: product_surface
          required: true
          schema: { type: string }
        - in: query
          name: org_id
          schema: { type: string }
      responses:
        "200": { description: Product installation }
        "404": { description: Product installation not found }
    put:
      summary: Crea o actualiza una installation
      parameters:
        - in: path
          name: product_surface
          required: true
          schema: { type: string }
        - in: query
          name: org_id
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductInstallationInput" }
      responses:
        "200": { description: Product installation saved }
  /v1/product-installations/{product_surface}/resolve:
    get:
      summary: Resuelve una installation activa y falla cerrado si no existe
      parameters:
        - in: path
          name: product_surface
          required: true
          schema: { type: string }
        - in: query
          name: org_id
          schema: { type: string }
      responses:
        "200": { description: Active product installation }
        "403": { description: Installation or product disabled }
        "404": { description: Product installation not found }
  /v1/agents:
    get:
      summary: Lista Agents de compatibilidad tecnica
      description: Endpoint legacy/tecnico de modulo tecnico de agents. Para producto y Console usar `/v1/virtual-employees`. Requiere `companion:runtime:admin` o `companion:cross_org`.
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Agent" }
  /v1/virtual-employees:
    get:
      summary: Lista Virtual Employees de la customer org
      description: API publica recomendada para trabajadores digitales persistentes. `tenant_id` es UUID publico y Companion mantiene `org_id + product_surface` solo como contexto interno de transicion.
      parameters:
        - in: query
          name: lifecycle
          schema: { type: string, enum: [active, archived, trashed, all], default: active }
      responses:
        "200":
          description: Virtual Employee list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/VirtualEmployee" }
    post:
      summary: Crea un Virtual Employee
      description: Crea un trabajador digital persistente con ID automatico. No acepta `agent_id`, `metadata`, `job_title`, `mission`, `responsibilities`, `allowed_tools`, `memory_enabled` ni `memory_scope_id`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VirtualEmployeeInput" }
      responses:
        "201":
          description: Virtual Employee created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VirtualEmployee" }
  /v1/employee-profiles:
    get:
      summary: Lista Employee Profiles
      description: |
        Superficie publica recomendada para perfiles de Virtual Employees.
        En v1 reutiliza Agent Profiles internamente; `profile_id` es el UUID
        publico del perfil y `profile_key` conserva la key tecnica usada por
        Agent/Runtime durante la transicion.
      parameters:
        - in: query
          name: lifecycle
          schema: { type: string, enum: [active, archived, trash, all], default: active }
        - in: query
          name: include_archived
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Employee Profile list
          content:
            application/json:
              schema:
                type: object
                properties:
                  employee_profiles:
                    type: array
                    items: { $ref: "#/components/schemas/EmployeeProfile" }
                  profiles:
                    type: array
                    items: { $ref: "#/components/schemas/EmployeeProfile" }
    post:
      summary: Crea un Employee Profile
      description: Crea un perfil con UUID publico automatico; el cliente puede enviar `profile_key` humano o dejarlo autogenerado.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmployeeProfileInput" }
      responses:
        "201":
          description: Employee Profile created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeProfile" }
  /v1/employee-profiles/{profile_id}:
    get:
      summary: Obtiene un Employee Profile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Employee Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeProfile" }
        "404": { description: Employee Profile not found }
    patch:
      summary: Actualiza un Employee Profile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmployeeProfileInput" }
      responses:
        "200":
          description: Employee Profile updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeProfile" }
  /v1/employee-profiles/{profile_id}/status:
    post:
      summary: Cambia el status de un Employee Profile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, archived, trashed] }
      responses:
        "200":
          description: Employee Profile status changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeProfile" }
  /v1/employee-profiles/{profile_id}/archive:
    post:
      summary: Archiva un Employee Profile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Employee Profile archived }
  /v1/employee-profiles/{profile_id}/restore:
    post:
      summary: Restaura un Employee Profile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Employee Profile restored }
  /v1/employee-profiles/{profile_id}/trash:
    post:
      summary: Mueve un Employee Profile a papelera
      parameters:
        - in: path
          name: profile_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Employee Profile trashed }
  /v1/employee-profiles/{profile_id}/purge:
    delete:
      summary: Elimina definitivamente un Employee Profile en papelera
      parameters:
        - in: path
          name: profile_id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Employee Profile purged }
  /v1/employee-profiles/{profile_id}/versions:
    get:
      summary: Lista snapshots anteriores de un Employee Profile
      parameters:
        - in: path
          name: profile_id
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Employee Profile versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items: { $ref: "#/components/schemas/EmployeeProfileVersion" }
  /v1/job-roles:
    get:
      summary: Lista JobRoles de la customer org
      description: |
        API publica para puestos de trabajo de Virtual Employees. Un JobRole
        define funcion, mision, responsabilidades y defaults recomendados para
        un trabajador digital dentro de `org_id + product_surface`. No autoriza
        acciones ni reemplaza IAM Role/PermissionBundle.
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: tenant_id
          description: Tenant UUID objetivo; durante la transicion Companion lo guarda como identificador opaco.
          schema: { type: string, format: uuid }
        - in: query
          name: lifecycle
          schema: { type: string, enum: [active, archived, all], default: active }
        - in: query
          name: include_archived
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: JobRole list
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_roles:
                    type: array
                    items: { $ref: "#/components/schemas/JobRole" }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/JobRole" }
    post:
      summary: Crea un JobRole con ID automatico
      description: |
        Superficie publica recomendada. El cliente no envia `job_role_id`; el
        backend genera un UUID publico. `slug` es la key humana unica dentro
        del tenant/contexto. JobRole recomienda defaults; no autoriza permisos.
      parameters:
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: tenant_id
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JobRoleInput" }
      responses:
        "201":
          description: JobRole created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobRole" }
  /v1/job-roles/{job_role_id}:
    get:
      summary: Obtiene un JobRole
      description: Requiere scope de lectura de Agents/Runtime admin en v1. `job_role_id` es UUID publico; durante la transicion tambien se aceptan keys legacy.
      parameters:
        - in: path
          name: job_role_id
          required: true
          schema: { type: string }
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
      responses:
        "200":
          description: JobRole
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobRole" }
        "404": { description: JobRole not found }
    patch:
      summary: Actualiza un JobRole
      description: |
        Superficie publica recomendada para modificar un JobRole existente.
        No cambia status; para archivar/restaurar usar `/status`.
      parameters:
        - in: path
          name: job_role_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
        - in: query
          name: tenant_id
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JobRoleInput" }
      responses:
        "200":
          description: JobRole updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobRole" }
    put:
      summary: Crea o actualiza un JobRole legacy
      description: |
        Compatibilidad tecnica para BFF/Console actuales. Para contratos nuevos
        usar `POST /v1/job-roles` y `PATCH /v1/job-roles/{job_role_id}`.
        Los campos `recommended_capabilities`, `default_permission_bundle_id`,
        `default_sla_policy` y `default_memory_policy` son defaults/recomendaciones,
        no enforcement.
      parameters:
        - in: path
          name: job_role_id
          required: true
          schema: { type: string }
        - in: query
          name: org_id
          schema: { type: string }
        - in: query
          name: product_surface
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JobRoleInput" }
      responses:
        "200":
          description: JobRole saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobRole" }
  /v1/job-roles/{job_role_id}/status:
    post:
      summary: Cambia el status de un JobRole
      description: Cambia entre `active` y `archived`. Idempotente cuando no hay cambio real.
      parameters:
        - in: path
          name: job_role_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, archived] }
      responses:
        "200":
          description: JobRole status changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobRole" }
  /v1/job-roles/{job_role_id}/archive:
    post:
      summary: Archiva un JobRole legacy
      description: Archiva el puesto sin borrar datos ni afectar permisos reales.
      parameters:
        - in: path
          name: job_role_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: JobRole archived }
        "404": { description: JobRole not found }
  /v1/job-roles/{job_role_id}/restore:
    post:
      summary: Restaura un JobRole archivado
      parameters:
        - in: path
          name: job_role_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: JobRole restored }
        "404": { description: JobRole not found }
  /v1/job-roles/{job_role_id}/versions:
    get:
      summary: Lista snapshots auditados de un JobRole
      parameters:
        - in: path
          name: job_role_id
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: JobRole versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items: { $ref: "#/components/schemas/JobRoleVersion" }
  /v1/agents/assignments:
    post:
      summary: Asigna un Agent activo por compatibilidad tecnica
      description: Endpoint tecnico de modulo tecnico de agents. La asignacion publica por Employee queda para Work Domain; no forma parte del core `VirtualEmployee`.
      responses:
        "200": { description: Agent assignment }
  /v1/agents/{agent_id}:
    get:
      summary: Obtiene un Agent de compatibilidad tecnica
      description: Endpoint tecnico de modulo tecnico de agents. Para trabajadores digitales publicos usar `/v1/virtual-employees/{employee_id}`.
      parameters:
        - in: path
          name: agent_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
    put:
      summary: Crea o actualiza un Agent de compatibilidad tecnica
      description: Endpoint tecnico de modulo tecnico de agents. No crea VirtualEmployees.
      parameters:
        - in: path
          name: agent_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Agent" }
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
  /v1/virtual-employees/{employee_id}:
    get:
      summary: Obtiene un Virtual Employee
      description: API publica recomendada. `employee_id` es UUID publico del Virtual Employee.
      parameters:
        - in: path
          name: employee_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Virtual Employee
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VirtualEmployee" }
    patch:
      summary: Actualiza un Virtual Employee
      description: Actualiza solo el core del Employee. No cambia status; para lifecycle usar `/status`.
      parameters:
        - in: path
          name: employee_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VirtualEmployeeInput" }
      responses:
        "200":
          description: Virtual Employee updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VirtualEmployee" }
  /v1/virtual-employees/{employee_id}/status:
    post:
      summary: Cambia el status de un Virtual Employee
      parameters:
        - in: path
          name: employee_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: "#/components/schemas/EmployeeStatus" }
      responses:
        "200":
          description: Virtual Employee status changed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VirtualEmployee" }
  /v1/handoffs:
    get:
      summary: Lista handoffs Employee -> Employee
      description: Superficie publica de Workforce. No usa `agent_id`; los handoffs tecnicos de modulo tecnico de agents viven en `/v1/agents/handoffs`.
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/HandoffStatus" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Handoff list
          content:
            application/json:
              schema:
                type: object
                properties:
                  handoffs:
                    type: array
                    items: { $ref: "#/components/schemas/Handoff" }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Handoff" }
    post:
      summary: Crea un handoff Employee -> Employee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HandoffInput" }
      responses:
        "201":
          description: Handoff created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Handoff" }
  /v1/handoffs/{handoff_id}:
    get:
      summary: Obtiene un handoff Employee -> Employee
      parameters:
        - in: path
          name: handoff_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Handoff
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Handoff" }
        "404": { description: Handoff not found }
    patch:
      summary: Actualiza un handoff Employee -> Employee
      description: Cambiar status a `accepted` puede reasignar la Task indicada por `task_id` al `to_employee_id`.
      parameters:
        - in: path
          name: handoff_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HandoffInput" }
      responses:
        "200":
          description: Handoff updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Handoff" }
  /v1/audit-events:
    get:
      summary: Lista AuditEvents comunes de Workforce
      description: Lee eventos comunes desde `lifecycle_audit`. No reemplaza Nexus evidence ni approvals.
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: resource_type
          schema: { type: string }
        - in: query
          name: resource_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Audit event list
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_events:
                    type: array
                    items: { $ref: "#/components/schemas/AuditEvent" }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AuditEvent" }
  /v1/agents/{agent_id}/disable:
    post:
      summary: Deshabilita un Agent de compatibilidad tecnica
      description: Endpoint tecnico de modulo tecnico de agents. Para VirtualEmployees usar `/v1/virtual-employees/{employee_id}/status`.
      parameters:
        - in: path
          name: agent_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
  /v1/agents/handoffs:
    get:
      summary: Lista handoffs entre Agents por compatibilidad tecnica
      description: Endpoint tecnico de modulo tecnico de agents. Handoffs publicos entre Employees quedan para Work Domain.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: Handoff list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AgentHandoff" }
    post:
      summary: Crea un handoff entre Agents por compatibilidad tecnica
      description: Endpoint tecnico de modulo tecnico de agents. Handoffs publicos entre Employees quedan para Work Domain.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentHandoff" }
      responses:
        "201":
          description: Handoff
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentHandoff" }
  /v1/agents/handoffs/{id}:
    patch:
      summary: Actualiza estado de handoff entre Agents por compatibilidad tecnica
      description: Endpoint tecnico de modulo tecnico de agents. Handoffs publicos entre Employees quedan para Work Domain. Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [accepted, rejected, completed, cancelled] }
      responses:
        "200":
          description: Handoff
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentHandoff" }
  /v1/jobs/{id}:
    get:
      summary: Obtiene estado y evidence de un job durable
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      responses:
        "200":
          description: Job durable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Job" }
  /v1/jobs/{id}/cancel:
    post:
      summary: Cancela un job durable queued/running
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - $ref: "#/components/parameters/UUIDPath"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { description: Cancelled }
  /v1/jobs/recover-expired:
    post:
      summary: Reencola jobs con leases vencidos
      description: Requiere `companion:runtime:admin` o `companion:cross_org`.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 100, minimum: 1 }
      responses:
        "200": { description: Recovery summary }
  /v1/nexus-assist/propose:
    post:
      summary: Analiza historial Nexus y propone learning/policies
      responses:
        "200": { description: Proposal summary }
  /v1/nexus-assist/explain/{request_id}:
    get:
      summary: Explica una request de Nexus para humano
      parameters:
        - in: path
          name: request_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: Explanation }
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    UUIDPath:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Product:
      type: object
      required: [product_surface, display_name, status]
      properties:
        product_surface: { type: string }
        display_name: { type: string }
        status: { type: string, enum: [active, disabled] }
        metadata:
          type: object
          additionalProperties: true
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProductInput:
      type: object
      properties:
        display_name: { type: string }
        status: { type: string, enum: [active, disabled] }
        metadata:
          type: object
          additionalProperties: true
    ProductInstallation:
      type: object
      required: [org_id, product_surface, auth_mode, enabled]
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string }
        product_surface: { type: string }
        external_tenant_id: { type: string }
        base_url: { type: string, format: uri }
        auth_mode:
          type: string
          enum: [none, api_key_ref, oauth2, internal_jwt, custom]
        secret_ref:
          type: string
          description: >
            Reference only; never inline secret. Supported refs: `env:NAME`,
            `vault:path`, `secretmanager:path`.
        enabled: { type: boolean }
        config:
          type: object
          additionalProperties: true
        created_by: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProductInstallationInput:
      type: object
      properties:
        external_tenant_id: { type: string }
        base_url: { type: string, format: uri }
        auth_mode:
          type: string
          enum: [none, api_key_ref, oauth2, internal_jwt, custom]
        secret_ref:
          type: string
          description: >
            Reference only; never inline secret. Supported refs: `env:NAME`,
            `vault:path`, `secretmanager:path`.
        enabled: { type: boolean, default: true }
        config:
          type: object
          additionalProperties: true
    MCPJSONRPCRequest:
      type: object
      required: [jsonrpc, method]
      additionalProperties: true
      properties:
        jsonrpc: { type: string, const: "2.0" }
        id:
          description: JSON-RPC request id.
        method:
          type: string
          enum: [initialize, notifications/initialized, ping, tools/list, tools/call]
        params:
          description: JSON-RPC method params.
    MCPJSONRPCResponse:
      type: object
      required: [jsonrpc]
      additionalProperties: true
      properties:
        jsonrpc: { type: string, const: "2.0" }
        id:
          description: JSON-RPC request id or null.
        result:
          description: JSON-RPC result payload.
        error:
          $ref: "#/components/schemas/MCPJSONRPCError"
    MCPJSONRPCError:
      type: object
      required: [code, message]
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          description: Optional structured error data.
    MCPTool:
      type: object
      required: [name, inputSchema]
      properties:
        name: { type: string }
        title: { type: string }
        description: { type: string }
        inputSchema:
          type: object
          additionalProperties: true
        annotations:
          type: object
          additionalProperties: true
    MCPToolsResponse:
      type: object
      required: [tools]
      properties:
        tools:
          type: array
          items: { $ref: "#/components/schemas/MCPTool" }
    MCPToolCallRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, example: axis.products.list }
        arguments:
          type: object
          additionalProperties: true
          description: Tool arguments. Must include effective tenant/product context when not provided by JWT.
        idempotency_key: { type: string }
        run_id: { type: string }
        tool_invocation_id: { type: string }
        reason: { type: string }
    MCPToolCallResponse:
      type: object
      required: [status, tool_name]
      properties:
        status:
          type: string
          enum: [executed, pending_approval, denied, blocked, rate_limited, payload_too_large, execution_error, error]
        tool_name: { type: string }
        request_id: { type: string, description: Nexus request id. }
        nexus_status: { type: string }
        nexus_decision: { type: string }
        decision_reason: { type: string }
        pending_approval: { type: boolean }
        denied: { type: boolean }
        result:
          description: Redacted tool result when execution succeeds.
        error: { type: string }
        metadata:
          type: object
          additionalProperties: true
    ChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string }
        task_id: { type: string, format: uuid }
        chat_id: { type: string, format: uuid, description: "Continúa conversación durable existente" }
        channel: { type: string, description: "Canal del caller. Default: api." }
        product_surface: { type: string }
        tenant_id: { type: string, format: uuid, description: "Tenant UUID requerido cuando se usa employee_id." }
        employee_id: { type: string, format: uuid, description: "Virtual Employee publico que toma ownership de la ejecucion." }
        agent_id: { type: string, description: "Agent tecnico legacy para runtime/compatibilidad." }
        route_hint: { type: string }
        confirmed_actions:
          type: array
          items: { type: string }
        handoff: { $ref: "#/components/schemas/ChatHandoff" }
        workspace:
          type: object
          additionalProperties: true
          description: |
            Contexto operativo de pantalla del producto (ej. customer_id,
            project_id, campaign_id, field_id). Gana sobre handoff.workspace
            y se persiste en la task para reusarse en turnos siguientes si no
            se reenvía.
    ChatResponse:
      description: |
        Response canónico del chat de Companion. Incluye chat_id, reply y
        blocks del contrato compartido, más task y messages como estado
        operativo estable de la API.
      type: object
      required: [reply, task, messages]
      properties:
        chat_id: { type: string, format: uuid }
        task_id: { type: string, format: uuid, description: "ID operativo legacy de la task; frontends deben preferir chat_id." }
        reply: { type: string }
        blocks:
          type: array
          items: { $ref: "#/components/schemas/ChatBlock" }
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/ChatToolCall" }
        pending_confirmations:
          type: array
          items: { $ref: "#/components/schemas/ChatPendingConfirmation" }
        tokens_used: { type: integer }
        routed_agent: { type: string }
        routing_source: { type: string }
        output_kind: { type: string }
        run_id: { type: string, format: uuid }
        employee_id: { type: string, format: uuid }
        agent_id: { type: string }
        task: { $ref: "#/components/schemas/Task" }
        messages:
          type: array
          items: { $ref: "#/components/schemas/TaskMessage" }
    ChatHandoff:
      type: object
      required: [source]
      properties:
        source: { type: string }
        target_agent: { type: string }
    ChatBlock:
      description: |
        Unión etiquetada por `type`. v0.1 solo expone la variante "text".
        Variantes reservadas (no emitirlas todavía): "actions",
        "insight_card", "kpi_group", "table".
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [text, actions, insight_card, kpi_group, table] }
        text: { type: string, description: "presente cuando type=text" }
    ChatToolCall:
      type: object
      required: [name]
      properties:
        name: { type: string }
        args: {}
        result: {}
        duration_ms: { type: integer }
        error: { type: string }
    ChatPendingConfirmation:
      type: object
      required: [id]
      properties:
        id: { type: string }
        description: { type: string }
        binding_hash: { type: string }
    CustomerMessagingInboundRequest:
      type: object
