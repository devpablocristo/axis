root = "."
tmp_dir = "tmp"

[build]
  cmd = "cd nexus && CGO_ENABLED=0 go build -o ../tmp/nexus ./cmd/api"
  bin = "./tmp/nexus"
  full_bin = "./tmp/nexus"
  include_dir = ["nexus"]
  include_ext = ["go", "sql", "yaml"]
  exclude_dir = ["tmp", "docs", "nexus/tmp", "console/node_modules", "console/dist"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
