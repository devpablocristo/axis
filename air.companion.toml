root = "."
tmp_dir = "tmp"

[build]
  cmd = "cd companion && CGO_ENABLED=0 go build -o ../tmp/companion ./cmd/api"
  bin = "./tmp/companion"
  full_bin = "./tmp/companion"
  include_dir = ["companion"]
  include_ext = ["go", "sql", "yaml"]
  exclude_dir = ["tmp", "companion/docs", "companion/tmp", "console/node_modules", "console/dist"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
