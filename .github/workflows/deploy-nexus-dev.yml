name: Deploy Nexus DEV

on:
  push:
    branches: [develop]
    paths:
      - "nexus/**"
      - "Dockerfile.nexus"
      - ".github/workflows/deploy-nexus-dev.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or ref to deploy"
        required: false
        default: "develop"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-nexus-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_DEV }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.NEXUS_CLOUD_RUN_SERVICE_ACCOUNT_DEV || vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
      IMAGE_NAME: ${{ vars.NEXUS_IMAGE_NAME_DEV || 'axis-nexus' }}
      SERVICE_NAME: ${{ vars.NEXUS_CLOUD_RUN_SERVICE_NAME_DEV || 'axis-nexus' }}
      SECRET_DATABASE_URL_NAME: ${{ vars.NEXUS_DATABASE_URL_SECRET_NAME_DEV || 'axis-nexus-database-url-dev' }}
      SECRET_API_KEYS_NAME: ${{ vars.NEXUS_API_KEYS_SECRET_NAME_DEV || 'axis-nexus-api-keys-dev' }}
      SECRET_SIGNING_KEY_NAME: ${{ vars.NEXUS_SIGNING_KEY_SECRET_NAME_DEV || 'axis-nexus-signing-key-dev' }}
      SECRET_CALLBACK_TOKEN_NAME: ${{ vars.NEXUS_CALLBACK_TOKEN_SECRET_NAME_DEV || 'axis-nexus-callback-token-dev' }}
      SECRET_INTERNAL_JWT_NAME: ${{ vars.AXIS_INTERNAL_JWT_SECRET_NAME_DEV || 'axis-internal-jwt-secret' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Validate workflow inputs
        run: |
          missing=0
          for var_name in \
            GCP_PROJECT_ID \
            GCP_REGION \
            WIF_PROVIDER \
            WIF_SERVICE_ACCOUNT \
            ARTIFACT_REGISTRY \
            CLOUDSQL_INSTANCE \
            CLOUD_RUN_SERVICE_ACCOUNT; do
            if [[ -z "${!var_name}" ]]; then
              echo "::error::$var_name is required"
              missing=1
            fi
          done
          exit "$missing"

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate Secret Manager inputs
        run: |
          missing=0
          for secret_name in \
            "$SECRET_DATABASE_URL_NAME" \
            "$SECRET_API_KEYS_NAME" \
            "$SECRET_SIGNING_KEY_NAME" \
            "$SECRET_CALLBACK_TOKEN_NAME" \
            "$SECRET_INTERNAL_JWT_NAME"; do
            if ! gcloud secrets versions access latest --project="$GCP_PROJECT_ID" --secret="$secret_name" >/dev/null 2>&1; then
              echo "::error::Secret Manager secret '$secret_name' is missing or has no versions in project '$GCP_PROJECT_ID'"
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -f Dockerfile.nexus -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          NEXUS_AUTH_ISSUER_URL: ${{ vars.NEXUS_AUTH_ISSUER_URL_DEV }}
          NEXUS_AUTH_AUDIENCE: ${{ vars.NEXUS_AUTH_AUDIENCE_DEV }}
          NEXUS_INTERNAL_JWT_ISSUER: ${{ vars.AXIS_INTERNAL_JWT_ISSUER_DEV || 'axis-bff' }}
          NEXUS_INTERNAL_JWT_AUDIENCE: ${{ vars.AXIS_NEXUS_AUDIENCE_DEV || 'nexus' }}
          NEXUS_APPROVAL_TTL: ${{ vars.NEXUS_APPROVAL_TTL_DEV || '3600' }}
          NEXUS_APPROVAL_PENDING_CALLBACK_URLS: ${{ vars.NEXUS_APPROVAL_PENDING_CALLBACK_URLS_DEV }}
          NEXUS_APPROVAL_RESOLVED_CALLBACK_URLS: ${{ vars.NEXUS_APPROVAL_RESOLVED_CALLBACK_URLS_DEV }}
          NEXUS_ATTESTATION_VERIFIER: ${{ vars.NEXUS_ATTESTATION_VERIFIER_DEV || 'none' }}
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="^|^NEXUS_ENV=dev|NEXUS_AUTH_ISSUER_URL=${NEXUS_AUTH_ISSUER_URL}|NEXUS_AUTH_AUDIENCE=${NEXUS_AUTH_AUDIENCE}|NEXUS_INTERNAL_JWT_ISSUER=${NEXUS_INTERNAL_JWT_ISSUER}|NEXUS_INTERNAL_JWT_AUDIENCE=${NEXUS_INTERNAL_JWT_AUDIENCE}|APPROVAL_DEFAULT_TTL=${NEXUS_APPROVAL_TTL}|NEXUS_APPROVAL_PENDING_CALLBACK_URLS=${NEXUS_APPROVAL_PENDING_CALLBACK_URLS}|NEXUS_APPROVAL_RESOLVED_CALLBACK_URLS=${NEXUS_APPROVAL_RESOLVED_CALLBACK_URLS}|NEXUS_ATTESTATION_VERIFIER=${NEXUS_ATTESTATION_VERIFIER}" \
            --set-secrets="DATABASE_URL=${SECRET_DATABASE_URL_NAME}:latest,NEXUS_API_KEYS=${SECRET_API_KEYS_NAME}:latest,NEXUS_SIGNING_KEY=${SECRET_SIGNING_KEY_NAME}:latest,NEXUS_CALLBACK_TOKEN=${SECRET_CALLBACK_TOKEN_NAME}:latest,NEXUS_INTERNAL_JWT_SECRET=${SECRET_INTERNAL_JWT_NAME}:latest" \
            --allow-unauthenticated \
            --ingress=all \
            --port=8080 \
            --min-instances=0 \
            --max-instances=3

      - name: Resolve service URL
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "::error::Could not resolve service URL"
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"
          echo "Service URL: $service_url"

      - name: Smoke check
        run: |
          for i in {1..20}; do
            read -r latest_ready latest_created < <(gcloud run services describe "$SERVICE_NAME" \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --format='value(status.latestReadyRevisionName,status.latestCreatedRevisionName)')
            if [[ -n "$latest_created" && "$latest_ready" == "$latest_created" ]]; then
              curl -fsS "$SERVICE_URL/readyz"
              exit 0
            fi
            echo "attempt $i: latestReady=$latest_ready latestCreated=$latest_created, retrying in 3s..."
            sleep 3
          done
          echo "::error::Cloud Run did not mark the latest revision ready"
          exit 1
