name: Deploy STG

on:
  push:
    branches: [main]
    paths:
      - "v2/bff/**"
      - "v2/companion/**"
      - "v2/console/**"
      - "v2/nexus/**"
      - "v2/Dockerfile.*"
      - ".github/workflows/deploy-stg.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to deploy"
        required: false
        default: "main"
      product:
        description: "Product to deploy"
        required: true
        type: choice
        default: "all"
        options: [all, nexus, companion, bff, console]

permissions:
  contents: read
  id-token: write

concurrency:
  group: axis-stg-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGION: ${{ vars.GCP_REGION_STG || 'us-central1' }}
  REGISTRY: ${{ vars.GCP_REGION_STG || 'us-central1' }}-docker.pkg.dev
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID_STG || 'axis-stg-884236' }}
  AR_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_STG || 'axis' }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER_STG || 'projects/322954730450/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider' }}
  WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_STG || 'axis-github-actions-stg@axis-stg-884236.iam.gserviceaccount.com' }}
  CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_STG || 'pymes-dev-352318:us-central1:pymes-dev-db' }}
  NEXUS_SERVICE: axis-nexus
  COMPANION_SERVICE: axis-companion
  BFF_SERVICE: axis-bff
  CONSOLE_SERVICE: axis-console
  NEXUS_RUNTIME_SA: ${{ vars.NEXUS_CLOUD_RUN_SERVICE_ACCOUNT_STG || 'axis-nexus-runtime-stg@axis-stg-884236.iam.gserviceaccount.com' }}
  COMPANION_RUNTIME_SA: ${{ vars.COMPANION_CLOUD_RUN_SERVICE_ACCOUNT_STG || 'axis-companion-runtime-stg@axis-stg-884236.iam.gserviceaccount.com' }}
  BFF_RUNTIME_SA: ${{ vars.AXIS_BFF_CLOUD_RUN_SERVICE_ACCOUNT_STG || 'axis-bff-runtime-stg@axis-stg-884236.iam.gserviceaccount.com' }}
  CONSOLE_RUNTIME_SA: ${{ vars.AXIS_CONSOLE_CLOUD_RUN_SERVICE_ACCOUNT_STG || 'axis-console-runtime-stg@axis-stg-884236.iam.gserviceaccount.com' }}
  INTERNAL_JWT_SECRET: ${{ vars.AXIS_INTERNAL_JWT_SECRET_NAME_STG || 'axis-internal-jwt-secret-stg' }}
  NEXUS_DATABASE_SECRET: ${{ vars.NEXUS_DATABASE_URL_SECRET_NAME_STG || 'axis-nexus-database-url-stg' }}
  NEXUS_API_KEYS_SECRET: ${{ vars.NEXUS_API_KEYS_SECRET_NAME_STG || 'axis-nexus-api-keys-stg' }}
  NEXUS_SIGNING_KEY_SECRET: ${{ vars.NEXUS_SIGNING_KEY_SECRET_NAME_STG || 'axis-nexus-signing-key-stg' }}
  NEXUS_CALLBACK_TOKEN_SECRET: ${{ vars.NEXUS_CALLBACK_TOKEN_SECRET_NAME_STG || 'axis-nexus-callback-token-stg' }}
  COMPANION_DATABASE_SECRET: ${{ vars.COMPANION_DATABASE_URL_SECRET_NAME_STG || 'axis-companion-database-url-stg' }}
  COMPANION_API_KEYS_SECRET: ${{ vars.COMPANION_API_KEYS_SECRET_NAME_STG || 'axis-companion-api-keys-stg' }}
  COMPANION_NEXUS_API_KEY_SECRET: ${{ vars.COMPANION_NEXUS_API_KEY_SECRET_NAME_STG || 'axis-companion-nexus-api-key-stg' }}
  BFF_DATABASE_SECRET: ${{ vars.AXIS_BFF_DATABASE_URL_SECRET_NAME_STG || 'axis-bff-database-url-stg' }}
  BFF_CLERK_SECRET_KEY_SECRET: ${{ vars.AXIS_BFF_CLERK_SECRET_KEY_SECRET_NAME_STG || 'axis-bff-clerk-secret-key-stg' }}
  PONTI_BASE_URL: ${{ vars.PONTI_BASE_URL_STG || 'https://pymes-core-sir42f2ama-uc.a.run.app' }}
  AXIS_BFF_AUTH_MODE: ${{ vars.AXIS_BFF_AUTH_MODE_STG || 'stg' }}
  AXIS_AUTH_ISSUER_URL: ${{ vars.AXIS_AUTH_ISSUER_URL_STG }}
  AXIS_AUTH_AUDIENCE: ${{ vars.AXIS_AUTH_AUDIENCE_STG }}
  AXIS_ALLOWED_ORIGIN: ${{ vars.AXIS_ALLOWED_ORIGIN_STG }}
  VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY_STG }}
  VITE_CLERK_JWT_TEMPLATE: ${{ vars.VITE_CLERK_JWT_TEMPLATE_STG || 'axis-bff' }}

jobs:
  prepare:
    name: Resolve deploy scope
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      sha: ${{ steps.resolve.outputs.sha }}
      nexus: ${{ steps.resolve.outputs.nexus }}
      companion: ${{ steps.resolve.outputs.companion }}
      bff: ${{ steps.resolve.outputs.bff }}
      console: ${{ steps.resolve.outputs.console }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref || github.sha }}
      - id: resolve
        env:
          PRODUCT: ${{ inputs.product || 'all' }}
        run: |
          set -euo pipefail
          missing=0
          for var_name in PROJECT_ID WIF_PROVIDER WIF_SERVICE_ACCOUNT CLOUDSQL_INSTANCE NEXUS_RUNTIME_SA COMPANION_RUNTIME_SA BFF_RUNTIME_SA CONSOLE_RUNTIME_SA NEXUS_DATABASE_SECRET NEXUS_API_KEYS_SECRET NEXUS_SIGNING_KEY_SECRET NEXUS_CALLBACK_TOKEN_SECRET COMPANION_DATABASE_SECRET COMPANION_API_KEYS_SECRET COMPANION_NEXUS_API_KEY_SECRET BFF_DATABASE_SECRET PONTI_BASE_URL; do
            if [[ -z "${!var_name}" ]]; then
              echo "::error::$var_name is required for STG"
              missing=1
            fi
          done
          if [[ "$AXIS_BFF_AUTH_MODE" != "dev" ]]; then
            for var_name in AXIS_AUTH_ISSUER_URL BFF_CLERK_SECRET_KEY_SECRET VITE_CLERK_PUBLISHABLE_KEY VITE_CLERK_JWT_TEMPLATE; do
              if [[ -z "${!var_name}" ]]; then
                echo "::error::$var_name is required when AXIS_BFF_AUTH_MODE_STG is not dev"
                missing=1
              fi
            done
          fi
          [[ "$missing" == "0" ]] || exit 1
          sha="$(git rev-parse HEAD)"
          nexus=false; companion=false; bff=false; console=false
          case "$PRODUCT" in
            all) nexus=true; companion=true; bff=true; console=true ;;
            nexus) nexus=true ;;
            companion) companion=true ;;
            bff) bff=true ;;
            console) console=true ;;
            *) echo "Invalid product: $PRODUCT" >&2; exit 1 ;;
          esac
          {
            echo "ref=$sha"
            echo "sha=$sha"
            echo "nexus=$nexus"
            echo "companion=$companion"
            echo "bff=$bff"
            echo "console=$console"
          } >> "$GITHUB_OUTPUT"

  nexus:
    name: Deploy Nexus STG
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.nexus == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
      - run: gcloud auth configure-docker "${REGISTRY}" --quiet
      - name: Build and push
        run: |
          image_uri="${REGISTRY}/${PROJECT_ID}/${AR_REPOSITORY}/axis-nexus:${{ needs.prepare.outputs.sha }}"
          docker build -f v2/Dockerfile.nexus -t "$image_uri" v2
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"
      - name: Deploy
        run: |
          gcloud run deploy "$NEXUS_SERVICE" \
            --project="$PROJECT_ID" --region="$REGION" --image="$IMAGE_URI" \
            --service-account="$NEXUS_RUNTIME_SA" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="NEXUS_V2_ENV=stg" \
            --set-secrets="NEXUS_V2_DATABASE_URL=${NEXUS_DATABASE_SECRET}:latest,NEXUS_V2_INTERNAL_AUTH_SECRET=${INTERNAL_JWT_SECRET}:latest" \
            --allow-unauthenticated --ingress=all --port=8080 --min-instances=0 --max-instances=3
      - name: Smoke
        run: |
          url="$(gcloud run services describe "$NEXUS_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')"
          curl -fsS "$url/readyz"

  companion:
    name: Deploy Companion STG
    runs-on: ubuntu-latest
    needs: [prepare, nexus]
    if: always() && needs.prepare.outputs.companion == 'true' && (needs.nexus.result == 'success' || needs.nexus.result == 'skipped')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
      - run: gcloud auth configure-docker "${REGISTRY}" --quiet
      - name: Resolve Nexus URL
        run: |
          nexus_url="$(gcloud run services describe "$NEXUS_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')"
          test -n "$nexus_url"
          echo "NEXUS_URL=$nexus_url" >> "$GITHUB_ENV"
      - name: Build and push
        run: |
          image_uri="${REGISTRY}/${PROJECT_ID}/${AR_REPOSITORY}/axis-companion:${{ needs.prepare.outputs.sha }}"
          docker build -f v2/Dockerfile.companion -t "$image_uri" v2
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"
      - name: Deploy
        run: |
          gcloud run deploy "$COMPANION_SERVICE" \
            --project="$PROJECT_ID" --region="$REGION" --image="$IMAGE_URI" \
            --service-account="$COMPANION_RUNTIME_SA" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="^|^COMPANION_V2_ENV=stg|COMPANION_V2_NEXUS_BASE_URL=${NEXUS_URL}|COMPANION_V2_EXECUTION_MODE=local" \
            --set-secrets="COMPANION_V2_DATABASE_URL=${COMPANION_DATABASE_SECRET}:latest,COMPANION_V2_INTERNAL_AUTH_SECRET=${INTERNAL_JWT_SECRET}:latest" \
            --allow-unauthenticated --ingress=all --port=8080 --min-instances=0 --max-instances=3
      - name: Smoke
        run: |
          url="$(gcloud run services describe "$COMPANION_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')"
          curl -fsS "$url/readyz"

  bff:
    name: Deploy BFF STG
    runs-on: ubuntu-latest
    needs: [prepare, nexus, companion]
    if: always() && needs.prepare.outputs.bff == 'true' && (needs.nexus.result == 'success' || needs.nexus.result == 'skipped') && (needs.companion.result == 'success' || needs.companion.result == 'skipped')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
      - run: gcloud auth configure-docker "${REGISTRY}" --quiet
      - name: Resolve service URLs
        run: |
          companion_url="$(gcloud run services describe "$COMPANION_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')"
          nexus_url="$(gcloud run services describe "$NEXUS_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')"
          test -n "$companion_url"
          test -n "$nexus_url"
          echo "COMPANION_URL=$companion_url" >> "$GITHUB_ENV"
          echo "NEXUS_URL=$nexus_url" >> "$GITHUB_ENV"
      - name: Build and push
        run: |
          image_uri="${REGISTRY}/${PROJECT_ID}/${AR_REPOSITORY}/axis-bff:${{ needs.prepare.outputs.sha }}"
          docker build -f v2/Dockerfile.bff -t "$image_uri" v2
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"
      - name: Deploy
        run: |
          gcloud run deploy "$BFF_SERVICE" \
            --project="$PROJECT_ID" --region="$REGION" --image="$IMAGE_URI" \
            --service-account="$BFF_RUNTIME_SA" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="^|^BFF_V2_ENV=stg|BFF_V2_IDENTITY_PROVIDER=${AXIS_BFF_AUTH_MODE}|BFF_V2_CLERK_ISSUER_URL=${AXIS_AUTH_ISSUER_URL}|BFF_V2_CORS_ORIGINS=${AXIS_ALLOWED_ORIGIN}|BFF_V2_COMPANION_BASE_URL=${COMPANION_URL}|BFF_V2_NEXUS_BASE_URL=${NEXUS_URL}" \
            --set-secrets="BFF_V2_DATABASE_URL=${BFF_DATABASE_SECRET}:latest,BFF_V2_CLERK_SECRET_KEY=${BFF_CLERK_SECRET_KEY_SECRET}:latest,BFF_V2_INTERNAL_AUTH_SECRET=${INTERNAL_JWT_SECRET}:latest" \
            --allow-unauthenticated --ingress=all --port=8080 --min-instances=0 --max-instances=3
      - name: Smoke
        run: |
          url="$(gcloud run services describe "$BFF_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')"
          curl -fsS "$url/readyz"

  console:
    name: Deploy Console STG
    runs-on: ubuntu-latest
    needs: [prepare, bff]
    if: always() && needs.prepare.outputs.console == 'true' && (needs.bff.result == 'success' || needs.bff.result == 'skipped')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ env.PROJECT_ID }}
      - run: gcloud auth configure-docker "${REGISTRY}" --quiet
      - name: Resolve BFF URL
        run: |
          bff_url="$(gcloud run services describe "$BFF_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')"
          project_number="$(gcloud projects describe "$PROJECT_ID" --format='value(projectNumber)')"
          service_hosts="$(gcloud run services describe "$CONSOLE_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format=json 2>/dev/null | jq -r '.metadata.annotations["run.googleapis.com/urls"] // "[]" | fromjson[] | sub("^https://"; "")' | paste -sd, - || true)"
          console_allowed_hosts="${CONSOLE_SERVICE}-${project_number}.${REGION}.run.app"
          if [[ -n "$service_hosts" ]]; then
            console_allowed_hosts="${console_allowed_hosts},${service_hosts}"
          fi
          test -n "$bff_url"
          test -n "$project_number"
          echo "BFF_URL=$bff_url" >> "$GITHUB_ENV"
          echo "CONSOLE_ALLOWED_HOSTS=$console_allowed_hosts" >> "$GITHUB_ENV"
      - name: Build and push
        run: |
          image_uri="${REGISTRY}/${PROJECT_ID}/${AR_REPOSITORY}/axis-console:${{ needs.prepare.outputs.sha }}"
          docker build -f v2/Dockerfile.console -t "$image_uri" v2
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"
      - name: Deploy
        run: |
          gcloud run deploy "$CONSOLE_SERVICE" \
            --project="$PROJECT_ID" --region="$REGION" --image="$IMAGE_URI" \
            --service-account="$CONSOLE_RUNTIME_SA" \
            --set-env-vars="^|^AXIS_BFF_BASE_URL=${BFF_URL}|AXIS_CONSOLE_ALLOWED_HOSTS=${CONSOLE_ALLOWED_HOSTS}|VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}|VITE_CLERK_JWT_TEMPLATE=${VITE_CLERK_JWT_TEMPLATE}" \
            --allow-unauthenticated --ingress=all --port=19173 --min-instances=0 --max-instances=3
      - name: Smoke
        run: |
          url="$(gcloud run services describe "$CONSOLE_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')"
          curl -fsS "$url/readyz"
