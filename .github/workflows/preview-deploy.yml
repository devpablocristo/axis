name: Preview Deploy

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      ref:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number"
        required: true
      ref:
        description: "Ref to deploy"
        required: true
        default: "main"

permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: axis-preview-pr-${{ inputs.pr_number }}
  cancel-in-progress: false

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  PROJECT_ID: new-ponti-dev
  AR_REPOSITORY: axis-preview
  WIF_PROVIDER: projects/1087442197188/locations/global/workloadIdentityPools/github-actions-pool/providers/github-axis
  WIF_SERVICE_ACCOUNT: github-actions@new-ponti-dev.iam.gserviceaccount.com
  CLOUDSQL_INSTANCE: new-ponti-dev:us-central1:new-ponti-db-dev
  NEXUS_RUNTIME_SA: cloudrun-sa@new-ponti-dev.iam.gserviceaccount.com
  COMPANION_RUNTIME_SA: cloudrun-sa@new-ponti-dev.iam.gserviceaccount.com
  BFF_RUNTIME_SA: cloudrun-sa@new-ponti-dev.iam.gserviceaccount.com
  CONSOLE_RUNTIME_SA: cloudrun-sa@new-ponti-dev.iam.gserviceaccount.com
  SQL_ADMIN_USER: axis_preview_admin
  SQL_ADMIN_SECRET: axis-sql-admin-password-preview
  PREVIEW_DB_USER: axis_preview_app
  PREVIEW_DB_SECRET: axis-db-password-preview
  INTERNAL_JWT_SECRET: axis-internal-jwt-secret-stg
  NEXUS_API_KEYS_SECRET: axis-nexus-api-keys-stg
  NEXUS_SIGNING_KEY_SECRET: axis-nexus-signing-key-stg
  NEXUS_CALLBACK_TOKEN_SECRET: axis-nexus-callback-token-stg
  COMPANION_API_KEYS_SECRET: axis-companion-api-keys-stg
  COMPANION_NEXUS_API_KEY_SECRET: axis-companion-nexus-api-key-stg
  PONTI_BASE_URL: ${{ vars.PONTI_BASE_URL_STG || 'https://pymes-core-sir42f2ama-uc.a.run.app' }}
  AXIS_BFF_AUTH_MODE: ${{ vars.AXIS_BFF_AUTH_MODE_STG || 'preview' }}
  AXIS_AUTH_ISSUER_URL: ${{ vars.AXIS_AUTH_ISSUER_URL_STG }}
  AXIS_AUTH_AUDIENCE: ${{ vars.AXIS_AUTH_AUDIENCE_STG }}
  AXIS_ALLOWED_ORIGIN: ${{ vars.AXIS_ALLOWED_ORIGIN_STG }}

jobs:
  preview:
    name: Deploy full preview stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.ref }}
      - name: Validate PR is still deployable
        id: pr-state
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]] || { echo "Invalid PR number: $PR_NUMBER" >&2; exit 1; }
          read -r state draft < <(gh api "repos/${REPOSITORY}/pulls/${PR_NUMBER}" --jq '[.state, (.draft|tostring)] | @tsv')
          should_deploy=false
          if [[ "$state" == "open" && "$draft" != "true" ]]; then
            should_deploy=true
          fi
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"
          if [[ "$should_deploy" != "true" ]]; then
            echo "Skipping preview deploy for PR ${PR_NUMBER}: state=${state}, draft=${draft}"
          fi
      - name: Resolve names
        if: steps.pr-state.outputs.should_deploy == 'true'
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          missing=0
          for var_name in PROJECT_ID WIF_PROVIDER WIF_SERVICE_ACCOUNT CLOUDSQL_INSTANCE NEXUS_RUNTIME_SA COMPANION_RUNTIME_SA BFF_RUNTIME_SA CONSOLE_RUNTIME_SA SQL_ADMIN_USER SQL_ADMIN_SECRET PREVIEW_DB_USER PREVIEW_DB_SECRET NEXUS_API_KEYS_SECRET NEXUS_SIGNING_KEY_SECRET NEXUS_CALLBACK_TOKEN_SECRET COMPANION_API_KEYS_SECRET COMPANION_NEXUS_API_KEY_SECRET PONTI_BASE_URL; do
            if [[ -z "${!var_name}" ]]; then
              echo "::error::$var_name is required for preview"
              missing=1
            fi
          done
          if [[ "$AXIS_BFF_AUTH_MODE" != "dev" ]]; then
            for var_name in AXIS_AUTH_ISSUER_URL AXIS_AUTH_AUDIENCE; do
              if [[ -z "${!var_name}" ]]; then
                echo "::error::$var_name is required when AXIS_BFF_AUTH_MODE_STG is not dev"
                missing=1
              fi
            done
          fi
          [[ "$missing" == "0" ]] || exit 1
          [[ "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]] || { echo "Invalid PR number: $PR_NUMBER" >&2; exit 1; }
          sha="$(git rev-parse HEAD)"
          echo "PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"
          echo "DEPLOY_SHA=$sha" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=pr-${PR_NUMBER}-${sha}" >> "$GITHUB_ENV"
          echo "NEXUS_SERVICE=axis-nexus-pr-${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "COMPANION_SERVICE=axis-companion-pr-${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "BFF_SERVICE=axis-bff-pr-${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "CONSOLE_SERVICE=axis-console-pr-${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "NEXUS_DB=axis_nexus_preview_pr_${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "COMPANION_DB=axis_companion_preview_pr_${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "NEXUS_DB_URL_SECRET=axis-nexus-database-url-pr-${PR_NUMBER}" >> "$GITHUB_ENV"
          echo "COMPANION_DB_URL_SECRET=axis-companion-database-url-pr-${PR_NUMBER}" >> "$GITHUB_ENV"
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        if: steps.pr-state.outputs.should_deploy == 'true'
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        if: steps.pr-state.outputs.should_deploy == 'true'
        with:
          project_id: ${{ env.PROJECT_ID }}
      - name: Prepare preview databases
        if: steps.pr-state.outputs.should_deploy == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          curl -fsSL -o /tmp/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.18.3/cloud-sql-proxy.linux.amd64
          chmod +x /tmp/cloud-sql-proxy
          /tmp/cloud-sql-proxy --address 127.0.0.1 --port 15434 "$CLOUDSQL_INSTANCE" &
          proxy_pid=$!
          cleanup() { kill "$proxy_pid" 2>/dev/null || true; wait "$proxy_pid" 2>/dev/null || true; }
          trap cleanup EXIT
          admin_password="$(gcloud secrets versions access latest --secret="$SQL_ADMIN_SECRET" --project="$PROJECT_ID")"
          app_password="$(gcloud secrets versions access latest --secret="$PREVIEW_DB_SECRET" --project="$PROJECT_ID")"
          app_password_enc="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$app_password")"
          export PGPASSWORD="$admin_password"
          for _ in $(seq 1 30); do
            psql -h 127.0.0.1 -p 15434 -U "$SQL_ADMIN_USER" -d postgres -c 'select 1' >/dev/null 2>&1 && break
            sleep 2
          done
          grant_db() {
            local db="$1"
            psql -h 127.0.0.1 -p 15434 -U "$SQL_ADMIN_USER" -d "$db" -v ON_ERROR_STOP=1 \
              -c "GRANT ALL PRIVILEGES ON DATABASE \"$db\" TO ${PREVIEW_DB_USER};" \
              -c "GRANT USAGE, CREATE ON SCHEMA public TO ${PREVIEW_DB_USER};" \
              -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO ${PREVIEW_DB_USER};" \
              -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO ${PREVIEW_DB_USER};"
          }
          create_db() {
            local db="$1"
            local exists
            exists="$(psql -h 127.0.0.1 -p 15434 -U "$SQL_ADMIN_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${db}'")"
            if [[ "$exists" != "1" ]]; then
              psql -h 127.0.0.1 -p 15434 -U "$SQL_ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE \"${db}\""
            fi
            grant_db "$db"
          }
          upsert_db_url_secret() {
            local secret_name="$1" db="$2" db_url
            db_url="postgres://${PREVIEW_DB_USER}:${app_password_enc}@/${db}?host=/cloudsql/${CLOUDSQL_INSTANCE}&sslmode=disable"
            if gcloud secrets describe "$secret_name" --project="$PROJECT_ID" >/dev/null 2>&1; then
              printf '%s' "$db_url" | gcloud secrets versions add "$secret_name" --data-file=- --project="$PROJECT_ID"
            else
              printf '%s' "$db_url" | gcloud secrets create "$secret_name" --replication-policy=automatic --data-file=- --project="$PROJECT_ID"
            fi
          }
          create_db "$NEXUS_DB"
          create_db "$COMPANION_DB"
          upsert_db_url_secret "$NEXUS_DB_URL_SECRET" "$NEXUS_DB"
          upsert_db_url_secret "$COMPANION_DB_URL_SECRET" "$COMPANION_DB"
      - run: gcloud auth configure-docker "${REGISTRY}" --quiet
        if: steps.pr-state.outputs.should_deploy == 'true'
      - name: Build and push images
        if: steps.pr-state.outputs.should_deploy == 'true'
        run: |
          for item in nexus companion bff console; do
            image_uri="${REGISTRY}/${PROJECT_ID}/${AR_REPOSITORY}/axis-${item}:${IMAGE_TAG}"
            docker build -f "v1/Dockerfile.${item}" -t "$image_uri" v1
            docker push "$image_uri"
            echo "${item^^}_IMAGE=$image_uri" >> "$GITHUB_ENV"
          done
      - name: Deploy Nexus
        if: steps.pr-state.outputs.should_deploy == 'true'
        run: |
          gcloud run deploy "$NEXUS_SERVICE" \
            --project="$PROJECT_ID" --region="$REGION" --image="$NEXUS_IMAGE" \
            --service-account="$NEXUS_RUNTIME_SA" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="^|^NEXUS_ENV=preview|NEXUS_INTERNAL_JWT_ISSUER=axis-bff|NEXUS_INTERNAL_JWT_AUDIENCE=nexus|APPROVAL_DEFAULT_TTL=3600|NEXUS_ATTESTATION_VERIFIER=none" \
            --set-secrets="DATABASE_URL=${NEXUS_DB_URL_SECRET}:latest,NEXUS_API_KEYS=${NEXUS_API_KEYS_SECRET}:latest,NEXUS_SIGNING_KEY=${NEXUS_SIGNING_KEY_SECRET}:latest,NEXUS_CALLBACK_TOKEN=${NEXUS_CALLBACK_TOKEN_SECRET}:latest,NEXUS_INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}:latest" \
            --allow-unauthenticated --ingress=all --port=8080 --min-instances=0 --max-instances=1 \
            --labels="axis-env=preview,axis-pr=${PR_NUMBER},managed-by=axis-preview"
          echo "NEXUS_URL=$(gcloud run services describe "$NEXUS_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')" >> "$GITHUB_ENV"
      - name: Deploy Companion
        if: steps.pr-state.outputs.should_deploy == 'true'
        run: |
          gcloud run deploy "$COMPANION_SERVICE" \
            --project="$PROJECT_ID" --region="$REGION" --image="$COMPANION_IMAGE" \
            --service-account="$COMPANION_RUNTIME_SA" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="^|^NEXUS_BASE_URL=${NEXUS_URL}|PONTI_BASE_URL=${PONTI_BASE_URL}|COMPANION_INTERNAL_JWT_ISSUER=axis-bff|COMPANION_INTERNAL_JWT_AUDIENCE=companion|COMPANION_LLM_PROVIDER=vertex|COMPANION_LLM_MODEL=gemini-2.5-flash-lite|COMPANION_LLM_VERTEX_PROJECT=${PROJECT_ID}|COMPANION_LLM_VERTEX_LOCATION=${REGION}|COMPANION_EMBEDDING_PROVIDER=vertex|COMPANION_EMBEDDING_MODEL=text-embedding-005|COMPANION_EMBEDDING_VERTEX_PROJECT=${PROJECT_ID}|COMPANION_EMBEDDING_VERTEX_LOCATION=${REGION}|COMPANION_EMBEDDING_DIMENSIONS=768|COMPANION_NEXUS_SYNC_INTERVAL_SEC=30|COMPANION_STRICT_NEXUS=true|COMPANION_DEFAULT_AUTONOMY_LEVEL=A2|COMPANION_WATCHER_INTERVAL_SEC=0|COMPANION_WATCHER_SYNC_INTERVAL_SEC=0" \
            --set-secrets="DATABASE_URL=${COMPANION_DB_URL_SECRET}:latest,COMPANION_API_KEYS=${COMPANION_API_KEYS_SECRET}:latest,NEXUS_API_KEY=${COMPANION_NEXUS_API_KEY_SECRET}:latest,COMPANION_INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}:latest" \
            --allow-unauthenticated --ingress=all --port=8080 --min-instances=0 --max-instances=1 \
            --labels="axis-env=preview,axis-pr=${PR_NUMBER},managed-by=axis-preview"
          echo "COMPANION_URL=$(gcloud run services describe "$COMPANION_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')" >> "$GITHUB_ENV"
      - name: Deploy BFF
        if: steps.pr-state.outputs.should_deploy == 'true'
        run: |
          gcloud run deploy "$BFF_SERVICE" \
            --project="$PROJECT_ID" --region="$REGION" --image="$BFF_IMAGE" \
            --service-account="$BFF_RUNTIME_SA" \
            --set-env-vars="^|^AXIS_BFF_AUTH_MODE=${AXIS_BFF_AUTH_MODE}|AXIS_AUTH_ISSUER_URL=${AXIS_AUTH_ISSUER_URL}|AXIS_AUTH_AUDIENCE=${AXIS_AUTH_AUDIENCE}|AXIS_INTERNAL_JWT_ISSUER=axis-bff|AXIS_COMPANION_AUDIENCE=companion|AXIS_NEXUS_AUDIENCE=nexus|AXIS_ALLOWED_ORIGIN=${AXIS_ALLOWED_ORIGIN}|AXIS_DOWNSTREAM_TIMEOUT=10s|AXIS_READ_HEADER_TIMEOUT=5s|COMPANION_BASE_URL=${COMPANION_URL}|NEXUS_BASE_URL=${NEXUS_URL}" \
            --set-secrets="AXIS_INTERNAL_JWT_SECRET=${INTERNAL_JWT_SECRET}:latest" \
            --allow-unauthenticated --ingress=all --port=8080 --min-instances=0 --max-instances=1 \
            --labels="axis-env=preview,axis-pr=${PR_NUMBER},managed-by=axis-preview"
          echo "BFF_URL=$(gcloud run services describe "$BFF_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')" >> "$GITHUB_ENV"
      - name: Deploy Console
        if: steps.pr-state.outputs.should_deploy == 'true'
        run: |
          gcloud run deploy "$CONSOLE_SERVICE" \
            --project="$PROJECT_ID" --region="$REGION" --image="$CONSOLE_IMAGE" \
            --service-account="$CONSOLE_RUNTIME_SA" \
            --set-env-vars="AXIS_BFF_BASE_URL=${BFF_URL}" \
            --allow-unauthenticated --ingress=all --port=80 --min-instances=0 --max-instances=1 \
            --labels="axis-env=preview,axis-pr=${PR_NUMBER},managed-by=axis-preview"
          echo "CONSOLE_URL=$(gcloud run services describe "$CONSOLE_SERVICE" --project="$PROJECT_ID" --region="$REGION" --format='value(status.url)')" >> "$GITHUB_ENV"
      - name: Smoke preview
        if: steps.pr-state.outputs.should_deploy == 'true'
        run: |
          curl -fsS "$NEXUS_URL/readyz"
          curl -fsS "$COMPANION_URL/readyz"
          curl -fsS "$BFF_URL/readyz"
          curl -fsS "$CONSOLE_URL/readyz"
