name: Preview PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: read
  id-token: write

jobs:
  changes:
    name: Detect preview eligibility
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            axis:
              - 'v1/**'
              - 'v2/**'
              - '.github/workflows/**'
      - id: resolve
        env:
          SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          AXIS_CHANGED: ${{ steps.filter.outputs.axis }}
        run: |
          should_deploy=false
          if [[ "$PR_AUTHOR" == "dependabot[bot]" ]]; then
            echo "Skipping preview deploy for Dependabot PRs."
          elif [[ "$SAME_REPO" == "true" && "$IS_DRAFT" != "true" && "$AXIS_CHANGED" == "true" ]]; then
            should_deploy=true
          fi
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy PR preview
    needs: changes
    if: needs.changes.outputs.should_deploy == 'true'
    uses: ./.github/workflows/preview-deploy.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      ref: ${{ github.event.pull_request.head.sha }}

  cleanup:
    name: Cleanup PR preview
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login != 'dependabot[bot]'
    uses: ./.github/workflows/preview-cleanup.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
