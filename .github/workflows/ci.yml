name: Axis CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: axis-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-contracts:
    name: api-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$GITHUB_SHA_VALUE"
          fi
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            base="$(git hash-object -t tree /dev/null)"
          fi
          git diff --check "$base" "$head"
          git diff --check
      - name: Install OpenAPI validator
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML==6.0.2 openapi-spec-validator==0.7.2
      - name: Validate OpenAPI contracts
        run: python scripts/quality/check-openapi.py companion/openapi.yaml nexus/openapi.yaml

  companion:
    name: companion
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: companion/go.mod
          cache-dependency-path: companion/go.sum
      - run: go vet ./...
        working-directory: companion
      - run: go test ./...
        working-directory: companion
      - run: bash scripts/quality/check-migrations.sh
        working-directory: companion
      - run: bash scripts/quality/check-nexus-imports.sh
        working-directory: companion
      - run: bash scripts/quality/check-side-effects-pipeline.sh
        working-directory: companion

  nexus:
    name: nexus
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: nexus/go.mod
          cache-dependency-path: nexus/go.sum
      - run: go vet ./...
        working-directory: nexus
      - run: go test ./...
        working-directory: nexus
      - run: bash scripts/quality/check-migrations.sh
        working-directory: nexus
      - run: bash scripts/quality/check-no-ai-runtime.sh
        working-directory: nexus

  bff:
    name: bff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: bff/go.mod
          cache-dependency-path: bff/go.sum
      - run: go test ./...
        working-directory: bff
      - run: go build ./...
        working-directory: bff

  console:
    name: console
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: console/.nvmrc
          cache: npm
          cache-dependency-path: console/package-lock.json
      - run: npm ci
        working-directory: console
      - run: npm run typecheck
        working-directory: console
      - run: npm run build
        working-directory: console

  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: make hygiene
      - run: docker compose config --services

  mcp-smoke:
    name: mcp-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [companion, nexus, api-contracts]
    steps:
      - uses: actions/checkout@v6
      - name: Prepare local compose secrets
        run: |
          touch /tmp/axis-empty-gcp-adc.json
          echo "COMPANION_GCP_ADC_HOST_PATH=/tmp/axis-empty-gcp-adc.json" >> "$GITHUB_ENV"
      - name: Start Companion MCP stack
        run: |
          make network
          docker compose up -d --build companion
      - name: Run Companion MCP smoke
        run: bash companion/scripts/smoke/run-companion-mcp-flow.sh
      - name: Dump compose logs
        if: failure()
        run: docker compose logs --no-color companion nexus companion-postgres nexus-postgres
      - name: Teardown
        if: always()
        run: |
          docker compose down -v
          docker network rm axis-local || true
