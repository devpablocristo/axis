name: Axis CI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: axis-ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-contracts:
    name: api-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Check whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$GITHUB_SHA_VALUE"
          fi
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            base="$(git hash-object -t tree /dev/null)"
          fi
          git diff --check "$base" "$head"
          git diff --check
      - name: Install OpenAPI validator
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML==6.0.2 openapi-spec-validator==0.7.2
      - name: Validate OpenAPI contracts
        run: python v1/scripts/quality/check-openapi.py v1/companion/openapi.yaml v1/nexus/openapi.yaml

  companion:
    name: companion
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: v1/companion/go.mod
          cache-dependency-path: v1/companion/go.sum
      - name: gofmt
        working-directory: v1/companion
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
        working-directory: v1/companion
      - run: go test ./...
        working-directory: v1/companion
      - run: bash scripts/onboarding/check-axis-readiness.sh
        working-directory: v1/companion
      - run: bash scripts/quality/check-migrations.sh
        working-directory: v1/companion
      - run: bash scripts/quality/check-nexus-imports.sh
        working-directory: v1/companion
      - run: bash scripts/quality/check-side-effects-pipeline.sh
        working-directory: v1/companion

  nexus:
    name: nexus
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: v1/nexus/go.mod
          cache-dependency-path: v1/nexus/go.sum
      - name: gofmt
        working-directory: v1/nexus
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
        working-directory: v1/nexus
      - run: go test ./...
        working-directory: v1/nexus
      - run: bash scripts/quality/check-migrations.sh
        working-directory: v1/nexus
      - run: bash scripts/quality/check-no-ai-runtime.sh
        working-directory: v1/nexus

  bff:
    name: bff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: v1/bff/go.mod
          cache-dependency-path: v1/bff/go.sum
      - name: gofmt
        working-directory: v1/bff
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - run: go test ./...
        working-directory: v1/bff
      - run: go build ./...
        working-directory: v1/bff

  console:
    name: console
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: v1/console/.nvmrc
          cache: npm
          cache-dependency-path: v1/console/package-lock.json
      - run: npm ci
        working-directory: v1/console
      - run: npm run typecheck
        working-directory: v1/console
      - run: npm run build
        working-directory: v1/console

  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: make hygiene
        working-directory: v1
      - run: docker compose config --services
        working-directory: v1

  mcp-smoke:
    name: mcp-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [companion, nexus, api-contracts]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Prepare local compose secrets
        run: |
          touch /tmp/axis-empty-gcp-adc.json
          echo "COMPANION_GCP_ADC_HOST_PATH=/tmp/axis-empty-gcp-adc.json" >> "$GITHUB_ENV"
          echo "COMPANION_LLM_PROVIDER=vertex" >> "$GITHUB_ENV"
          echo "COMPANION_LLM_VERTEX_PROJECT=axis-ci-smoke" >> "$GITHUB_ENV"
          echo "COMPANION_EMBEDDING_PROVIDER=hash" >> "$GITHUB_ENV"
          echo "COMPANION_EMBEDDING_MODEL=hash-v1" >> "$GITHUB_ENV"
      - name: Start Companion MCP stack
        run: |
          make network
          docker compose up -d --build companion
        working-directory: v1
      - name: Run Companion MCP smoke
        run: bash companion/scripts/smoke/run-companion-mcp-flow.sh
        working-directory: v1
      - name: Run Companion MCP runtime policy smoke
        run: bash companion/scripts/smoke/run-companion-mcp-runtime-policy-flow.sh
        working-directory: v1
      - name: Collect smoke diagnostics
        if: failure()
        run: |
          mkdir -p smoke-artifacts
          docker compose ps > smoke-artifacts/compose-ps.txt || true
          docker compose logs --no-color companion nexus companion-postgres nexus-postgres > smoke-artifacts/compose.log || true
          tail -n 500 smoke-artifacts/compose.log || true
        working-directory: v1
      - name: Upload smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-smoke-diagnostics-${{ github.run_id }}
          path: v1/smoke-artifacts/
          if-no-files-found: ignore
      - name: Teardown
        if: always()
        run: |
          docker compose down -v
          docker network rm axis-local || true
        working-directory: v1

  platform-nightly:
    name: platform-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: [companion, nexus, bff, console, api-contracts]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Prepare local compose secrets
        run: |
          touch /tmp/axis-empty-gcp-adc.json
          echo "COMPANION_GCP_ADC_HOST_PATH=/tmp/axis-empty-gcp-adc.json" >> "$GITHUB_ENV"
      - name: Start Axis platform stack
        run: |
          make network
          docker compose up -d --build companion
        working-directory: v1
      - name: Run full local smoke suite
        run: make smoke
        working-directory: v1
      - name: Collect nightly diagnostics
        if: failure()
        run: |
          mkdir -p smoke-artifacts
          docker compose ps > smoke-artifacts/compose-ps.txt || true
          docker compose logs --no-color companion nexus companion-postgres nexus-postgres > smoke-artifacts/compose.log || true
          tail -n 500 smoke-artifacts/compose.log || true
        working-directory: v1
      - name: Upload nightly diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: platform-nightly-diagnostics-${{ github.run_id }}
          path: v1/smoke-artifacts/
          if-no-files-found: ignore
      - name: Teardown
        if: always()
        run: |
          docker compose down -v
          docker network rm axis-local || true
        working-directory: v1
