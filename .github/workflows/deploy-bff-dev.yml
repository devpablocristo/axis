name: Deploy BFF DEV

on:
  push:
    branches: [develop]
    paths:
      - "bff/**"
      - "Dockerfile.bff"
      - ".github/workflows/deploy-bff-dev.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or ref to deploy"
        required: false
        default: "develop"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-bff-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.AXIS_BFF_CLOUD_RUN_SERVICE_ACCOUNT_DEV || vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
      IMAGE_NAME: ${{ vars.AXIS_BFF_IMAGE_NAME_DEV || 'axis-bff' }}
      SERVICE_NAME: ${{ vars.AXIS_BFF_CLOUD_RUN_SERVICE_NAME_DEV || 'axis-bff' }}
      SECRET_INTERNAL_JWT_NAME: ${{ vars.AXIS_INTERNAL_JWT_SECRET_NAME_DEV || 'axis-internal-jwt-secret' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Validate workflow inputs
        env:
          COMPANION_BASE_URL: ${{ vars.AXIS_COMPANION_BASE_URL_DEV }}
          NEXUS_BASE_URL: ${{ vars.AXIS_NEXUS_BASE_URL_DEV }}
        run: |
          missing=0
          for var_name in \
            GCP_PROJECT_ID \
            GCP_REGION \
            WIF_PROVIDER \
            WIF_SERVICE_ACCOUNT \
            ARTIFACT_REGISTRY \
            CLOUD_RUN_SERVICE_ACCOUNT \
            COMPANION_BASE_URL \
            NEXUS_BASE_URL; do
            if [[ -z "${!var_name}" ]]; then
              echo "::error::$var_name is required"
              missing=1
            fi
          done
          exit "$missing"

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate Secret Manager inputs
        run: |
          if ! gcloud secrets versions access latest --project="$GCP_PROJECT_ID" --secret="$SECRET_INTERNAL_JWT_NAME" >/dev/null 2>&1; then
            echo "::error::Secret Manager secret '$SECRET_INTERNAL_JWT_NAME' is missing or has no versions in project '$GCP_PROJECT_ID'"
            exit 1
          fi

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -f Dockerfile.bff -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          AXIS_BFF_AUTH_MODE: ${{ vars.AXIS_BFF_AUTH_MODE_DEV || 'dev' }}
          AXIS_AUTH_ISSUER_URL: ${{ vars.AXIS_AUTH_ISSUER_URL_DEV }}
          AXIS_AUTH_AUDIENCE: ${{ vars.AXIS_AUTH_AUDIENCE_DEV }}
          AXIS_DEV_ORG_ID: ${{ vars.AXIS_DEV_ORG_ID || 'local-dev-org' }}
          AXIS_DEV_USER_ID: ${{ vars.AXIS_DEV_USER_ID || 'local-dev-admin' }}
          AXIS_DEV_SCOPES: ${{ vars.AXIS_DEV_SCOPES_DEV }}
          AXIS_INTERNAL_JWT_ISSUER: ${{ vars.AXIS_INTERNAL_JWT_ISSUER_DEV || 'axis-bff' }}
          AXIS_COMPANION_AUDIENCE: ${{ vars.AXIS_COMPANION_AUDIENCE_DEV || 'companion' }}
          AXIS_NEXUS_AUDIENCE: ${{ vars.AXIS_NEXUS_AUDIENCE_DEV || 'nexus' }}
          AXIS_ALLOWED_ORIGIN: ${{ vars.AXIS_ALLOWED_ORIGIN_DEV }}
          AXIS_DOWNSTREAM_TIMEOUT: ${{ vars.AXIS_DOWNSTREAM_TIMEOUT_DEV || '10s' }}
          AXIS_READ_HEADER_TIMEOUT: ${{ vars.AXIS_READ_HEADER_TIMEOUT_DEV || '5s' }}
          COMPANION_BASE_URL: ${{ vars.AXIS_COMPANION_BASE_URL_DEV }}
          NEXUS_BASE_URL: ${{ vars.AXIS_NEXUS_BASE_URL_DEV }}
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --set-env-vars="^|^AXIS_BFF_AUTH_MODE=${AXIS_BFF_AUTH_MODE}|AXIS_AUTH_ISSUER_URL=${AXIS_AUTH_ISSUER_URL}|AXIS_AUTH_AUDIENCE=${AXIS_AUTH_AUDIENCE}|AXIS_DEV_ORG_ID=${AXIS_DEV_ORG_ID}|AXIS_DEV_USER_ID=${AXIS_DEV_USER_ID}|AXIS_DEV_SCOPES=${AXIS_DEV_SCOPES}|AXIS_INTERNAL_JWT_ISSUER=${AXIS_INTERNAL_JWT_ISSUER}|AXIS_COMPANION_AUDIENCE=${AXIS_COMPANION_AUDIENCE}|AXIS_NEXUS_AUDIENCE=${AXIS_NEXUS_AUDIENCE}|AXIS_ALLOWED_ORIGIN=${AXIS_ALLOWED_ORIGIN}|AXIS_DOWNSTREAM_TIMEOUT=${AXIS_DOWNSTREAM_TIMEOUT}|AXIS_READ_HEADER_TIMEOUT=${AXIS_READ_HEADER_TIMEOUT}|COMPANION_BASE_URL=${COMPANION_BASE_URL}|NEXUS_BASE_URL=${NEXUS_BASE_URL}" \
            --set-secrets="AXIS_INTERNAL_JWT_SECRET=${SECRET_INTERNAL_JWT_NAME}:latest" \
            --allow-unauthenticated \
            --ingress=all \
            --port=8080 \
            --min-instances=0 \
            --max-instances=3

      - name: Resolve service URL
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "::error::Could not resolve service URL"
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"
          echo "Service URL: $service_url"

      - name: Smoke check
        run: |
          for i in {1..20}; do
            read -r latest_ready latest_created < <(gcloud run services describe "$SERVICE_NAME" \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --format='value(status.latestReadyRevisionName,status.latestCreatedRevisionName)')
            if [[ -n "$latest_created" && "$latest_ready" == "$latest_created" ]]; then
              curl -fsS "$SERVICE_URL/readyz"
              exit 0
            fi
            echo "attempt $i: latestReady=$latest_ready latestCreated=$latest_created, retrying in 3s..."
            sleep 3
          done
          echo "::error::Cloud Run did not mark the latest revision ready"
          exit 1
