name: Deploy Companion DEV

on:
  push:
    branches: [main, develop]
    paths:
      - "companion/**"
      - "Dockerfile.companion"
      - ".github/workflows/deploy-companion-dev.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or ref to deploy"
        required: false
        default: "main"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-companion-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID_DEV }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      WIF_PROVIDER: ${{ vars.WIF_PROVIDER_DEV }}
      WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT_DEV }}
      ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
      CLOUDSQL_INSTANCE: ${{ vars.CLOUDSQL_INSTANCE_DEV }}
      CLOUD_RUN_SERVICE_ACCOUNT: ${{ vars.COMPANION_CLOUD_RUN_SERVICE_ACCOUNT_DEV || vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}
      IMAGE_NAME: ${{ vars.COMPANION_IMAGE_NAME_DEV || 'companion' }}
      SERVICE_NAME: ${{ vars.COMPANION_CLOUD_RUN_SERVICE_NAME_DEV || 'companion-dev' }}
      DB_USER: ${{ vars.COMPANION_DB_USER_DEV || 'companion_app' }}
      DB_NAME: ${{ vars.COMPANION_DB_NAME_DEV || 'companion' }}
      SECRET_DB_PASSWORD_NAME: ${{ vars.COMPANION_DB_PASSWORD_SECRET_NAME_DEV || 'companion-db-password' }}
      SECRET_API_KEYS_NAME: ${{ vars.COMPANION_API_KEYS_SECRET_NAME_DEV || 'companion-api-keys' }}
      SECRET_NEXUS_API_KEY_NAME: ${{ vars.COMPANION_NEXUS_API_KEY_SECRET_NAME_DEV || 'companion-nexus-api-key' }}
      SECRET_INTERNAL_JWT_NAME: ${{ vars.AXIS_INTERNAL_JWT_SECRET_NAME_DEV || 'axis-internal-jwt-secret' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Validate workflow inputs
        env:
          NEXUS_BASE_URL: ${{ vars.COMPANION_NEXUS_BASE_URL_DEV }}
          COMPANION_LLM_PROVIDER: ${{ vars.COMPANION_LLM_PROVIDER_DEV || 'vertex' }}
          COMPANION_LLM_VERTEX_PROJECT: ${{ vars.COMPANION_LLM_VERTEX_PROJECT_DEV }}
        run: |
          missing=0
          for var_name in \
            GCP_PROJECT_ID \
            GCP_REGION \
            WIF_PROVIDER \
            WIF_SERVICE_ACCOUNT \
            ARTIFACT_REGISTRY \
            CLOUDSQL_INSTANCE \
            CLOUD_RUN_SERVICE_ACCOUNT \
            NEXUS_BASE_URL; do
            if [[ -z "${!var_name}" ]]; then
              echo "::error::$var_name is required"
              missing=1
            fi
          done
          if [[ "$COMPANION_LLM_PROVIDER" != "fake" && "$COMPANION_LLM_PROVIDER" != "noop" && -z "$COMPANION_LLM_VERTEX_PROJECT" ]]; then
            echo "::error::COMPANION_LLM_VERTEX_PROJECT is required when COMPANION_LLM_PROVIDER is not fake/noop"
            missing=1
          fi
          exit "$missing"

      - name: Auth GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validate Secret Manager inputs
        run: |
          missing=0
          for secret_name in \
            "$SECRET_DB_PASSWORD_NAME" \
            "$SECRET_API_KEYS_NAME" \
            "$SECRET_NEXUS_API_KEY_NAME" \
            "$SECRET_INTERNAL_JWT_NAME"; do
            if ! gcloud secrets versions access latest --project="$GCP_PROJECT_ID" --secret="$secret_name" >/dev/null 2>&1; then
              echo "::error::Secret Manager secret '$secret_name' is missing or has no versions in project '$GCP_PROJECT_ID'"
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker build -f Dockerfile.companion -t "$image_uri" .
          docker push "$image_uri"
          echo "IMAGE_URI=$image_uri" >> "$GITHUB_ENV"

      - name: Resolve DATABASE_URL
        run: |
          db_password="$(gcloud secrets versions access latest --project="$GCP_PROJECT_ID" --secret="$SECRET_DB_PASSWORD_NAME")"
          if [[ -z "$db_password" ]]; then
            echo "::error::Could not resolve $SECRET_DB_PASSWORD_NAME"
            exit 1
          fi
          echo "::add-mask::$db_password"
          export DB_PASSWORD="$db_password"
          db_password_enc="$(python3 -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['DB_PASSWORD'], safe=''))")"
          database_url="postgres://${DB_USER}:${db_password_enc}@/${DB_NAME}?host=/cloudsql/${CLOUDSQL_INSTANCE}"
          echo "::add-mask::$database_url"
          echo "DATABASE_URL=$database_url" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          NEXUS_BASE_URL: ${{ vars.COMPANION_NEXUS_BASE_URL_DEV }}
          COMPANION_AUTH_ISSUER_URL: ${{ vars.COMPANION_AUTH_ISSUER_URL_DEV }}
          COMPANION_AUTH_AUDIENCE: ${{ vars.COMPANION_AUTH_AUDIENCE_DEV }}
          COMPANION_INTERNAL_JWT_ISSUER: ${{ vars.AXIS_INTERNAL_JWT_ISSUER_DEV || 'axis-bff' }}
          COMPANION_INTERNAL_JWT_AUDIENCE: ${{ vars.AXIS_COMPANION_AUDIENCE_DEV || 'companion' }}
          COMPANION_LLM_PROVIDER: ${{ vars.COMPANION_LLM_PROVIDER_DEV || 'vertex' }}
          COMPANION_LLM_MODEL: ${{ vars.COMPANION_LLM_MODEL_DEV || 'gemini-2.5-flash-lite' }}
          COMPANION_LLM_VERTEX_PROJECT: ${{ vars.COMPANION_LLM_VERTEX_PROJECT_DEV }}
          COMPANION_LLM_VERTEX_LOCATION: ${{ vars.COMPANION_LLM_VERTEX_LOCATION_DEV || 'us-central1' }}
          COMPANION_NEXUS_SYNC_INTERVAL_SEC: ${{ vars.COMPANION_NEXUS_SYNC_INTERVAL_SEC_DEV || '30' }}
          COMPANION_STRICT_NEXUS: ${{ vars.COMPANION_STRICT_NEXUS_DEV || 'true' }}
          COMPANION_DEFAULT_AUTONOMY_LEVEL: ${{ vars.COMPANION_DEFAULT_AUTONOMY_LEVEL_DEV || 'A2' }}
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_URI" \
            --service-account="$CLOUD_RUN_SERVICE_ACCOUNT" \
            --add-cloudsql-instances="$CLOUDSQL_INSTANCE" \
            --set-env-vars="^|^DATABASE_URL=${DATABASE_URL}|NEXUS_BASE_URL=${NEXUS_BASE_URL}|COMPANION_AUTH_ISSUER_URL=${COMPANION_AUTH_ISSUER_URL}|COMPANION_AUTH_AUDIENCE=${COMPANION_AUTH_AUDIENCE}|COMPANION_INTERNAL_JWT_ISSUER=${COMPANION_INTERNAL_JWT_ISSUER}|COMPANION_INTERNAL_JWT_AUDIENCE=${COMPANION_INTERNAL_JWT_AUDIENCE}|COMPANION_LLM_PROVIDER=${COMPANION_LLM_PROVIDER}|COMPANION_LLM_MODEL=${COMPANION_LLM_MODEL}|COMPANION_LLM_VERTEX_PROJECT=${COMPANION_LLM_VERTEX_PROJECT}|COMPANION_LLM_VERTEX_LOCATION=${COMPANION_LLM_VERTEX_LOCATION}|COMPANION_NEXUS_SYNC_INTERVAL_SEC=${COMPANION_NEXUS_SYNC_INTERVAL_SEC}|COMPANION_STRICT_NEXUS=${COMPANION_STRICT_NEXUS}|COMPANION_DEFAULT_AUTONOMY_LEVEL=${COMPANION_DEFAULT_AUTONOMY_LEVEL}|COMPANION_WATCHER_INTERVAL_SEC=0|COMPANION_WATCHER_SYNC_INTERVAL_SEC=0" \
            --set-secrets="COMPANION_API_KEYS=${SECRET_API_KEYS_NAME}:latest,NEXUS_API_KEY=${SECRET_NEXUS_API_KEY_NAME}:latest,COMPANION_INTERNAL_JWT_SECRET=${SECRET_INTERNAL_JWT_NAME}:latest" \
            --allow-unauthenticated \
            --ingress=all \
            --port=8080 \
            --min-instances=0 \
            --max-instances=3

      - name: Resolve service URL
        run: |
          service_url="$(gcloud run services describe "$SERVICE_NAME" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "::error::Could not resolve service URL"
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"
          echo "Service URL: $service_url"

      - name: Smoke check
        run: |
          for i in {1..20}; do
            read -r latest_ready latest_created < <(gcloud run services describe "$SERVICE_NAME" \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --format='value(status.latestReadyRevisionName,status.latestCreatedRevisionName)')
            if [[ -n "$latest_created" && "$latest_ready" == "$latest_created" ]]; then
              curl -fsS "$SERVICE_URL/readyz"
              exit 0
            fi
            echo "attempt $i: latestReady=$latest_ready latestCreated=$latest_created, retrying in 3s..."
            sleep 3
          done
          echo "::error::Cloud Run did not mark the latest revision ready"
          exit 1
